<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Tarzı 3D Futbol</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        #score {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            color: #ffcc00;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
            transition: 0.2s;
        }
        button:hover {
            background: #c0392b;
        }
        #controls-info {
            margin-top: 10px;
            font-size: 12px;
            color: #bbb;
            line-height: 1.4;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui">
        <div id="score">OYUNCU: 0 | BOT: 0</div>
        <button id="toggleBotBtn">Rakip Botu Kaldır</button>
        <div id="controls-info">
            <b>Hareket:</b> W, A, S, D<br>
            <b>Kamera (Roblox Tarzı):</b> Sağ Tık + Sürükle<br>
            <b>Topa vurmak:</b> Topa doğru koşun!
        </div>
    </div>

    <script>
        // --- SAHNE VE KAMERA AYARLARI ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Gökyüzü mavisi

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Roblox tarzı Sağ Tık Kamera Kontrolü
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1; // Yere gömülmeyi engelle
        controls.minDistance = 5;
        controls.maxDistance = 25;
        // Sadece SAĞ TIK ile döndürme ayarı
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.NONE,
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE
        };

        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- DOKULAR (MINECRAFT TARZI PROTO-TEXTURES) ---
        function createBlockTexture(color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, 16, 16);
            ctx.fillStyle = color2;
            // Minecraft pikselli havası vermek için kenarlık çizgileri
            ctx.fillRect(1, 1, 14, 14);
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        const grassTex = createBlockTexture('#557a2b', '#4d6e27');
        const playerTex = createBlockTexture('#2980b9', '#3498db');
        const botTex = createBlockTexture('#c0392b', '#e74c3c');
        const gkTex = createBlockTexture('#f39c12', '#f1c40f');
        const ballTex = createBlockTexture('#bdc3c7', '#ffffff');

        // --- SAHA VE KALELER ---
        // Çim Saha (Küp bloklardan oluşuyor gibi)
        const fieldGeo = new THREE.BoxGeometry(30, 1, 40);
        const fieldMat = new THREE.MeshStandardMaterial({ map: grassTex });
        const field = new THREE.Mesh(fieldGeo, fieldMat);
        field.position.y = -0.5;
        field.receiveShadow = true;
        scene.add(field);

        // Saha Çizgileri
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const midLine = new THREE.Mesh(new THREE.PlaneGeometry(30, 0.2), lineMat);
        midLine.rotation.x = -Math.PI / 2;
        midLine.position.set(0, 0.01, 0);
        scene.add(midLine);

        // Kale Yapma Fonksiyonu
        function createGoal(zPos, color) {
            const goalGroup = new THREE.Group();
            const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            
            const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 0.5), postMat);
            leftPost.position.set(-4, 2, 0);
            
            const rightPost = leftPost.clone();
            rightPost.position.set(4, 2, 0);
            
            const crossbar = new THREE.Mesh(new THREE.BoxGeometry(8.5, 0.5, 0.5), postMat);
            crossbar.position.set(0, 4, 0);

            goalGroup.add(leftPost, rightPost, crossbar);
            goalGroup.position.set(0, 0, zPos);
            scene.add(goalGroup);
        }
        createGoal(-20); // Oyuncunun gol atacağı kale
        createGoal(20);  // Botun gol atacağı kale

        // --- KARAKTERLER (MINECRAFT KÜP MODEL) ---
        function createSteve(texture) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ map: texture });
            
            // Gövde
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.6), mat);
            body.position.y = 1.1;
            body.castShadow = true;
            group.add(body);
            
            // Kafa
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), mat);
            head.position.y = 2.05;
            head.castShadow = true;
            group.add(head);

            return group;
        }

        const player = createSteve(playerTex);
        player.position.set(0, 0, 10);
        scene.add(player);

        // Rakip Bot
        let botActive = true;
        const enemyBot = createSteve(botTex);
        enemyBot.position.set(0, 0, -10);
        scene.add(enemyBot);

        // Kaleciler
        const homeGK = createSteve(gkTex); // Oyuncunun kalecisi
        homeGK.position.set(0, 0, 18);
        scene.add(homeGK);

        const awayGK = createSteve(gkTex); // Botun kalecisi
        awayGK.position.set(0, 0, -18);
        scene.add(awayGK);

        // --- TOP ---
        const ballGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6); // Minecraft stili küp top
        const ballMat = new THREE.MeshStandardMaterial({ map: ballTex });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.3, 0);
        ball.castShadow = true;
        scene.add(ball);

        let ballVel = new THREE.Vector3(0, 0, 0);

        // --- KONTROLLER & KLAVYE ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // UI Buton İşlevi (Bot Kaldır/Ekle)
        const toggleBotBtn = document.getElementById('toggleBotBtn');
        toggleBotBtn.addEventListener('click', () => {
            botActive = !botActive;
            if (!botActive) {
                scene.remove(enemyBot);
                toggleBotBtn.innerText = "Rakip Botu Ekle";
                toggleBotBtn.style.background = "#2ecc71";
            } else {
                scene.add(enemyBot);
                enemyBot.position.set(0, 0, -10);
                toggleBotBtn.innerText = "Rakip Botu Kaldır";
                toggleBotBtn.style.background = "#e74c3c";
            }
        });

        // Skorlar
        let playerScore = 0;
        let botScore = 0;
        const scoreDiv = document.getElementById('score');

        function resetPositions() {
            ball.position.set(0, 0.3, 0);
            ballVel.set(0, 0, 0);
            player.position.set(0, 0, 10);
            if(botActive) enemyBot.position.set(0, 0, -10);
        }

        // --- ANA OYUN DÖNGÜSÜ (ANIMATE) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const speed = 7 * delta;

            // 1. Oyuncu Hareketi (Kamera açısına göre yön belirleme)
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0;
            right.normalize();

            let moveDirection = new THREE.Vector3();
            if (keys.w) moveDirection.add(forward);
            if (keys.s) moveDirection.add(forward.clone().negate());
            if (keys.a) moveDirection.add(right.clone().negate());
            if (keys.d) moveDirection.add(right);

            if (moveDirection.lengthSq() > 0) {
                moveDirection.normalize();
                player.position.addScaledVector(moveDirection, speed);
                // Karakteri gittiği yöne döndür
                const angle = Math.atan2(moveDirection.x, moveDirection.z);
                player.rotation.y = angle;
            }

            // Saha Sınırları Koruyucu (Oyuncu dışarı çıkmasın)
            player.position.x = Math.max(-14.5, Math.min(14.5, player.position.x));
            player.position.z = Math.max(-19.5, Math.min(19.5, player.position.z));

            // 2. Rakip Bot Yapay Zekası (Aktifse topa koşar)
            if (botActive) {
                const dirToBall = new THREE.Vector3().subVectors(ball.position, enemyBot.position);
                dirToBall.y = 0;
                if(dirToBall.length() > 0.5) {
                    dirToBall.normalize();
                    enemyBot.position.addScaledVector(dirToBall, speed * 0.85); // Oyuncudan biraz yavaş
                    enemyBot.rotation.y = Math.atan2(dirToBall.x, dirToBall.z);
                }
            }

            // 3. Kaleci Bot Yapay Zekası (Sadece X ekseninde topu takip ederler)
            homeGK.position.x += (ball.position.x - homeGK.position.x) * 0.1;
            homeGK.position.x = Math.max(-3.5, Math.min(3.5, homeGK.position.x)); // Kale genişliği sınırı

            awayGK.position.x += (ball.position.x - awayGK.position.x) * 0.1;
            awayGK.position.x = Math.max(-3.5, Math.min(3.5, awayGK.position.x));

            // 4. Top Fiziği ve Sürtünme
            ball.position.add(ballVel);
            ballVel.multiplyScalar(0.98); // Sürtünme yavaşlatması
            ball.rotation.x += ballVel.z * 0.5;
            ball.rotation.z -= ballVel.x * 0.5;

            // Top Saha Duvarı Çarpmaları
            if (Math.abs(ball.position.x) > 14.5) {
                ballVel.x *= -1;
                ball.position.x = Math.sign(ball.position.x) * 14.5;
            }
            if (Math.abs(ball.position.z) > 19.5) {
                // Eğer kale içindeyse gol kontrolü yap, değilse duvardan çarptır
                if (Math.abs(ball.position.x) < 4) {
                    // GOL!
                    if (ball.position.z < 0) {
                        playerScore++;
                    } else {
                        botScore++;
                    }
                    scoreDiv.innerText = `OYUNCU: ${playerScore} | BOT: ${botScore}`;
                    resetPositions();
                } else {
                    ballVel.z *= -1;
                    ball.position.z = Math.sign(ball.position.z) * 19.5;
                }
            }

            // 5. Çarpışma Kontrolleri (Topa Vurma)
            function checkBallCollision(entity, power) {
                const dist = entity.position.distanceTo(ball.position);
                if (dist < 1.2) { // Çarpışma mesafesi
                    const force = new THREE.Vector3().subVectors(ball.position, entity.position);
                    force.y = 0;
                    force.normalize();
                    ballVel.addScaledVector(force, power);
                }
            }

            checkBallCollision(player, 0.15);
            if (botActive) checkBallCollision(enemyBot, 0.13);
            checkBallCollision(homeGK, 0.15);
            checkBallCollision(awayGK, 0.15);

            controls.update();
            renderer.render(scene, camera);
        }

        // Pencere Boyutu Değişirse Uyarlama
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
