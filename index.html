<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hamyazparkour</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; pointer-events: none; max-width: 300px; }
        #stats { position: absolute; top: 10px; right: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; pointer-events: none; text-align: right; }
        h3 { margin: 0 0 5px 0; color: #55ff55; text-shadow: 1px 1px #000; font-size: 16px; }
        p { margin: 3px 0; font-size: 12px; }
        .stat-val { color: #ffcc00; font-weight: bold; }
        
        /* MOBIL DÜĞMELERİ */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; display: none; touch-action: none; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; }
        #jump-btn { position: absolute; bottom: 50px; right: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; display: none; color: white; font-weight: bold; text-align: center; line-height: 80px; font-size: 18px; touch-action: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h3>HAMYAZPARKOUR v8 [MULTIPLAYER & MOBIL]</h3>
        <p><b>PC:</b> W,A,S,D | MOUSE (Sağ tık basılı tut çevir)</p>
        <p><b>MOBİL:</b> Ekranı kaydırarak bak, Sol Kolla Yürü</p>
        <hr style="border-color: #444;">
        <p id="checkpoint-text" style="color: #55ff55; font-weight: bold;">Lobi: İnsanlarla Tanış veya Parkura Başla!</p>
    </div>

    <div id="stats">
        <h3>LİDERLİK</h3>
        <p>MAHMUT 1 (SEN): <span id="timer-val" class="stat-val">0</span> ölme</p>
        <p style="color:#ff4444;">MAHMUT 2 (BOT): <span id="bot1-val" class="stat-val" style="color:#ff4444;">0</span></p>
        <p style="color:#bb44ff;">MAHMUT 3 (BOT): <span id="bot2-val" class="stat-val" style="color:#bb44ff;">0</span></p>
    </div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div id="jump-btn">ZIPLA</div>

    <script>
        // Mobil Kontrol tespiti
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('joystick-zone').style.display = 'block';
            document.getElementById('jump-btn').style.display = 'block';
        }

        // --- 1. SES SENTEZLEYİCİ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f1, f2, type, d) {
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = type;
                osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
                if(f2) osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + d);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + d);
                osc.start(); osc.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        // --- 2. SAHNE VE AYDINLATMA ---
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0xaaccff);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.75); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5ea, 0.7); dirLight.position.set(40, 80, 30); scene.add(dirLight);

        // --- 3. DOKU ÜRETECİ (HD TEXTURE) ---
        function createPixelTexture(base, noise, shadow) {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = base; ctx.fillRect(0, 0, 64, 64);
            for (let x = 0; x < 64; x++) {
                for (let y = 0; y < 64; y++) {
                    const r = Math.random();
                    if (r > 0.88) { ctx.fillStyle = noise; ctx.fillRect(x, y, 1, 1); }
                    else if (r < 0.12) { ctx.fillStyle = shadow; ctx.fillRect(x, y, 1, 1); }
                }
            }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fillRect(0, 0, 64, 2); ctx.fillRect(0, 0, 2, 64);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.fillRect(0, 62, 64, 2); ctx.fillRect(62, 0, 2, 64);
            const t = new THREE.CanvasTexture(canvas); t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
            return t;
        }

        const grassTex = createPixelTexture('#3b8f21', '#4ca634', '#2d6d19');
        const stoneTex = createPixelTexture('#6b6b6b', '#828282', '#525252');
        const cpTex    = createPixelTexture('#e67e22', '#f39c12', '#d35400');
        const lavaTex  = createPixelTexture('#e74c3c', '#e67e22', '#c0392b');
        const diamondTex = createPixelTexture('#1abc9c', '#2ecc71', '#16a085');

        // Giyim renkleri (Mavi=Sen, Kırmızı=Bot1, Mor=Bot2)
        const skinTex  = createPixelTexture('#f3c19f', '#faebd7', '#e0aa85');
        const cloth1   = createPixelTexture('#2980b9', '#3498db', '#1f6391'); 
        const cloth2   = createPixelTexture('#c0392b', '#e74c3c', '#962d22'); 
        const cloth3   = createPixelTexture('#8e44ad', '#9b59b6', '#6c3483'); 
        const pantsTex = createPixelTexture('#2c3e50', '#34495e', '#1a252f');

        // --- 4. HARİTA İNŞASI ---
        const blocks = [];
        function createBlock(x, y, z, w, h, d, tex, isCP=false, isFinish=false) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ map: tex }));
            mesh.position.set(x, y, z); scene.add(mesh);
            const b = { mesh: mesh, minX: x-w/2, maxX: x+w/2, topY: y+h/2, minZ: z-d/2, maxZ: z+d/2, isCP: isCP, isFinish: isFinish, spawn: {x:x, y:y+h/2, z:z}, isMoving: false };
            blocks.push(b); return b;
        }

        // BÜYÜK YEŞİLLİK ALAN (LOBİ MEYDANI)
        createBlock(0, -1, 15, 30, 2, 30, grassTex); 

        // SÜPER AYAKKABI (GÜÇLENDİRİCİ ITEM)
        const bootGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const bootMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true });
        const bootItem = new THREE.Mesh(bootGeo, bootMat); bootItem.position.set(0, 1, 15); scene.add(bootItem);

        // PARKUR DİZİLİMİ
        createBlock(0, 0, -2, 4, 2, 4, stoneTex);
        createBlock(0, 1, -9, 2.5, 2, 2.5, stoneTex);
        createBlock(3, 2, -15, 2.5, 2, 2.5, stoneTex);
        createBlock(0, 3, -22, 4, 2, 4, cpTex, true); // Checkpoint 1

        // HAREKETLİ BLOK (Moving Platform)
        const movingBlock = createBlock(-3, 4, -29, 2.5, 1, 2.5, stoneTex);
        movingBlock.isMoving = true; movingBlock.startX = -3;

        createBlock(2, 5, -36, 2.5, 2, 2.5, stoneTex);
        createBlock(2, 6.5, -43, 4, 2, 4, cpTex, true); // Checkpoint 2

        createBlock(-2, 7.5, -50, 2.5, 2, 2.5, stoneTex);
        createBlock(1, 8.5, -57, 2.5, 2, 2.5, stoneTex);
        createBlock(0, 9.5, -66, 6, 2, 6, diamondTex, false, true); // Bitiş

        // LAVA TRAMPLENİ
        createBlock(0, -25, -20, 1200, 1, 1200, lavaTex);

        // Bulutlar
        for(let i=0; i<10; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(15,1,10), new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.8}));
            m.position.set((Math.random()-0.5)*150, 25, (Math.random()-0.5)*150); scene.add(m);
        }

        // --- 5. KARAKTER FABRİKASI ---
        function createCharacter(name, shirtTex) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshLambertMaterial({ map: shirtTex })); body.position.y = 1.0; group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), [
                new THREE.MeshLambertMaterial({map:skinTex}), new THREE.MeshLambertMaterial({map:skinTex}),
                new THREE.MeshLambertMaterial({map:skinTex}), new THREE.MeshLambertMaterial({map:skinTex}),
                new THREE.MeshLambertMaterial({map:(function(){
                    const c = document.createElement('canvas'); c.width=32; c.height=32; const cx=c.getContext('2d');
                    cx.fillStyle='#f3c19f'; cx.fillRect(0,0,32,32); cx.fillStyle='#fff'; cx.fillRect(4,10,6,4); cx.fillRect(22,10,6,4);
                    cx.fillStyle='#2980b9'; cx.fillRect(6,10,4,4); cx.fillRect(22,10,4,4); cx.fillStyle='#c0392b'; cx.fillRect(10,22,12,3);
                    const t=new THREE.CanvasTexture(c); t.magFilter=THREE.NearestFilter; return t;
                })()}), new THREE.MeshLambertMaterial({map:skinTex})
            ]); head.position.y = 1.9; group.add(head);

            // İsim Etiketi
            const can = document.createElement('canvas'); can.width=256; can.height=64; const ctx=can.getContext('2d');
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(28,12,200,40); ctx.font='bold 20px monospace'; ctx.fillStyle='#fff';
            ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(name, 128, 32);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(can), transparent:true}));
            sprite.position.y = 2.6; sprite.scale.set(2.5, 0.6, 1); group.add(sprite);

            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:shirtTex})); lArm.position.set(-0.55,1,0); group.add(lArm);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:shirtTex})); rArm.position.set(0.55,1,0); group.add(rArm);
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:pantsTex})); lLeg.position.set(-0.22,0.4,0); group.add(lLeg);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:pantsTex})); rLeg.position.set(0.22,0.4,0); group.add(rLeg);

            scene.add(group);
            return { mesh: group, lLeg:lLeg, rLeg:rLeg, lArm:lArm, rArm:rArm, velY:0, grounded:true, deaths:0, cp:{x:0,y:0,z:20}, jumpPower:0.16, powerTimer:0, targetBlockIdx: 0 };
        }

        const p1 = createCharacter("Mahmut 1 (Sen)", cloth1); p1.mesh.position.set(0, 0, 20);
        const bot1 = createCharacter("Mahmut 2", cloth2); bot1.mesh.position.set(-4, 0, 18);
        const bot2 = createCharacter("Mahmut 3", cloth3); bot2.mesh.position.set(4, 0, 18);

        // --- 6. INPUTS & CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', e => { if(audioCtx.state==='suspended') audioCtx.resume(); keys[e.code]=true; });
        window.addEventListener('keyup', e => keys[e.code]=false);

        // Mobil Dokunmatik Bakış Altyapısı
        let camRotX = 0.2, camRotY = 0;
        let isMouseDown = false, prevTouchX = 0, prevTouchY = 0;

        window.addEventListener('mousedown', e => { if(e.button===2 || e.button===0) isMouseDown = true; });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', e => {
            if(isMouseDown || !('ontouchstart' in window)) {
                camRotY -= e.movementX * 0.005; camRotX += e.movementY * 0.005;
                camRotX = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotX));
            }
        });

        window.addEventListener('touchstart', e => {
            if(e.touches[0].clientX > window.innerWidth / 2) {
                prevTouchX = e.touches[0].clientX; prevTouchY = e.touches[0].clientY;
            }
        }, {passive:true});
        window.addEventListener('touchmove', e => {
            for(let t of e.touches) {
                if(t.clientX > window.innerWidth / 2) {
                    let dx = t.clientX - prevTouchX; let dy = t.clientY - prevTouchY;
                    camRotY -= dx * 0.007; camRotX += dy * 0.007;
                    camRotX = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotX));
                    prevTouchX = t.clientX; prevTouchY = t.clientY;
                }
            }
        }, {passive:true});

        // Sanal Joystick İşlemleri
        const joyZone = document.getElementById('joystick-zone');
        const joyStick = document.getElementById('joystick-stick');
        let joyX = 0, joyY = 0, joyActive = false, joyTouchId = null;

        joyZone.addEventListener('touchstart', e => {
            joyActive = true; joyTouchId = e.changedTouches[0].identifier;
        }, {passive:true});
        window.addEventListener('touchmove', e => {
            if(!joyActive) return;
            for(let t of e.touches) {
                if(t.identifier === joyTouchId) {
                    let rect = joyZone.getBoundingClientRect();
                    let cx = rect.left + 60; let cy = rect.top + 60;
                    let dx = t.clientX - cx; let dy = t.clientY - cy;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > 45) { dx = (dx/dist)*45; dy = (dy/dist)*45; }
                    joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
                    joyX = dx / 45; joyY = dy / 45;
                }
            }
        }, {passive:true});
        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyTouchId) {
                    joyActive = false; joyStick.style.transform = 'translate(0px, 0px)';
                    joyX = 0; joyY = 0;
                }
            }
        });
        document.getElementById('jump-btn').addEventListener('touchstart', e => {
            if(p1.grounded) { p1.velY = p1.jumpPower; p1.grounded = false; playSound(130, 280, 'triangle', 0.15); }
        }, {passive:true});

        // --- 7. FİZİK VE DÖNGÜSÜ (BOTLAR DAHİL) ---
        const clock = new THREE.Clock();

        function updatePhysics(p, mx, mz, delta, isBot=false) {
            p.mesh.position.x += mx; p.mesh.position.z += mz;
            if(mx!==0 || mz!==0) p.mesh.rotation.y = Math.atan2(mx, mz);

            // Uzuv sallama animasyonu
            if((mx!==0 || mz!==0) && p.grounded) {
                let speedFactor = isBot ? 10 : (keys['ShiftLeft'] ? 16 : 10);
                let time = clock.getElapsedTime() * speedFactor;
                p.lLeg.rotation.x = Math.sin(time)*0.6; p.rLeg.rotation.x = -Math.sin(time)*0.6;
                p.lArm.rotation.x = -Math.sin(time)*0.6; p.rArm.rotation.x = Math.sin(time)*0.6;
            } else if(!p.grounded) {
                p.lLeg.rotation.x = -0.2; p.rLeg.rotation.x = 0.2;
            } else {
                p.lLeg.rotation.x = p.rLeg.rotation.x = p.lArm.rotation.x = p.rArm.rotation.x = 0;
            }

            // Yerçekimi
            p.velY -= 0.007; p.mesh.position.y += p.velY;
            let hit = false;

            for(let b of blocks) {
                const bx = p.mesh.position.x; const by = p.mesh.position.y; const bz = p.mesh.position.z;
                if(bx >= b.minX-0.4 && bx <= b.maxX+0.4 && bz >= b.minZ-0.4 && bz <= b.maxZ+0.4) {
                    if(by <= b.topY && by >= b.topY-0.4 && p.velY <= 0) {
                        p.mesh.position.y = b.topY; p.velY = 0; p.grounded = true; hit = true;
                        
                        if(b.isMoving) p.mesh.position.x += Math.sin(clock.getElapsedTime()*2)*0.05; // Platformla taşı

                        if(!isBot && b.isCP && p.cp.z !== b.spawn.z) {
                            p.cp = {x: b.spawn.x, y: b.spawn.y, z: b.spawn.z};
                            document.getElementById('checkpoint-text').innerText = "Durum: Checkpoint Alındı!";
                        }
                        if(!isBot && b.isFinish) {
                            document.getElementById('checkpoint-text').innerText = "🏆 GG! PARKURU BİTİRDİN! 🏆";
                        }
                        break;
                    }
                }
            }
            if(!hit) p.grounded = false;

            // Güçlendirici Azalması
            if(p.powerTimer > 0) {
                p.powerTimer -= delta;
                if(p.powerTimer <= 0) p.jumpPower = 0.16; // Normal zıplama gücü
            }

            // Düştü mü?
            if(p.mesh.position.y < -15) {
                p.deaths++;
                if(!isBot) {
                    document.getElementById('timer-val').innerText = p.deaths; playSound(100, 50, 'sawtooth', 0.2);
                } else {
                    if(p === bot1) document.getElementById('bot1-val').innerText = p.deaths;
                    if(p === bot2) document.getElementById('bot2-val').innerText = p.deaths;
                    // Bot öldüğünde hedefini sıfırla veya rastgele lobiye yolla
                    p.targetBlockIdx = Math.random() > 0.5 ? 0 : 1;
                }
                p.mesh.position.set(p.cp.x, p.cp.y, p.cp.z); p.velY = 0; p.grounded = true;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. Eşya Animasyonu (Süper Ayakkabı Dönsün)
            bootItem.rotation.y += delta * 2;
            bootItem.position.y = 1 + Math.sin(clock.getElapsedTime() * 3) * 0.15;

            // 2. Hareketli Blok Güncellemesi
            for(let b of blocks) {
                if(b.isMoving) {
                    let offset = Math.sin(clock.getElapsedTime() * 2) * 2;
                    b.mesh.position.x = b.startX + offset;
                    b.minX = b.mesh.position.x - 1.25; b.maxX = b.mesh.position.x + 1.25;
                }
            }

            // 3. Oyuncu Hareketi (PC + Mobil)
            let speed = keys['ShiftLeft'] ? 0.14 : 0.08;
            let mx = 0, mz = 0;
            const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), camRotY);
            const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), camRotY);

            if(keys['KeyW']) { mx += forward.x*speed; mz += forward.z*speed; }
            if(keys['KeyS']) { mx -= forward.x*speed; mz -= forward.z*speed; }
            if(keys['KeyA']) { mx -= right.x*speed; mz -= right.z*speed; }
            if(keys['KeyD']) { mx += right.x*speed; mz += right.z*speed; }
            
            // Mobil sanal kol eklemesi
            if(joyActive) {
                mx += (forward.x * -joyY + right.x * joyX) * speed;
                mz += (forward.z * -joyY + right.z * joyX) * speed;
            }

            if(keys['Space'] && p1.grounded) { p1.velY = p1.jumpPower; p1.grounded = false; playSound(120, 280, 'triangle', 0.15); }

            // Güçlendirici Yakalama Kontrolü
            if(p1.mesh.position.distanceTo(bootItem.position) < 1.2 && p1.powerTimer <= 0) {
                p1.jumpPower = 0.24; p1.powerTimer = 5.0; // 5 saniye mega zıplama
                playSound(300, 600, 'sine', 0.3);
                document.getElementById('checkpoint-text').innerText = "🚀 SÜPER AYAKKABI ALINDI! (5 Sn)";
            }

            updatePhysics(p1, mx, mz, delta, false);

            // 4. MULTIPLAYER BOT YAPAY ZEKASI (Mahmut 2 & Mahmut 3)
            [bot1, bot2].forEach((bot, index) => {
                let currentPos = bot.mesh.position;
                // Botların sırayla atlayacağı hedefler (Lobi veya parkur blokları)
                if(bot.targetBlockIdx >= blocks.length - 1) bot.targetBlockIdx = 0;
                
                let targetBlock = blocks[bot.targetBlockIdx];
                if(targetBlock.isCP) { bot.cp = {x: targetBlock.spawn.x, y: targetBlock.spawn.y, z: targetBlock.spawn.z}; }

                let targetX = targetBlock.mesh.position.x + (index === 0 ? -0.5 : 0.5);
                let targetZ = targetBlock.mesh.position.z;

                let dx = targetX - currentPos.x;
                let dz = targetZ - currentPos.z;
                let dist2D = Math.sqrt(dx*dx + dz*dz);

                let bmx = 0, bmz = 0;
                let bSpeed = 0.05 + (index * 0.01); // Farklı hızlar

                if(dist2D > 0.5) {
                    bmx = (dx / dist2D) * bSpeed;
                    bmz = (dz / dist2D) * bSpeed;
                    
                    // Önünde uçurum veya engel varsa zıplama mantığı
                    if(bot.grounded && (dist2D < 3.5 || Math.random() < 0.02)) {
                        bot.velY = bot.jumpPower; bot.grounded = false;
                    }
                } else {
                    // Blok üzerine ulaştıysa bir sonraki bloğu hedefle
                    if(bot.grounded) bot.targetBlockIdx++;
                }
                updatePhysics(bot, bmx, bmz, delta, true);
            });

            // 5. ÜÇÜNCÜ ŞAHIS KAMERA TAKİBİ
            const tx = p1.mesh.position.x - Math.sin(camRotY)*Math.cos(camRotX)*7;
            const ty = p1.mesh.position.y + 2.0 + Math.sin(camRotX)*7;
            const tz = p1.mesh.position.z - Math.cos(camRotY)*Math.cos(camRotX)*7;
            camera.position.set(tx, ty, tz);
            camera.lookAt(p1.mesh.position.x, p1.mesh.position.y + 1.0, p1.mesh.position.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
