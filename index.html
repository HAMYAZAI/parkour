<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hamyazparkour - ORİJİNAL ANA SÜRÜM</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; background-color: #000; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; z-index: 10; max-width: 300px; pointer-events: none; }
        #stats { position: absolute; top: 10px; right: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; pointer-events: none; text-align: right; z-index: 10; }
        h3 { margin: 0 0 5px 0; color: #55ff55; text-shadow: 1px 1px #000; font-size: 16px; }
        p { margin: 3px 0; font-size: 12px; }
        .stat-val { color: #ffcc00; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #power-bar { width: 100%; background: #333; height: 6px; margin-top: 5px; border-radius: 3px; overflow: hidden; display: none; }
        #power-fill { width: 100%; background: #ffcc00; height: 100%; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="ui">
        <h3>HAMYAZPARKOUR v9</h3>
        <p><b>KONTROLLER:</b></p>
        <p>• Ekrana Tıkla -> Fareyle Bak</p>
        <p>• Hareket: W, A, S, D</p>
        <p>• Zıplama: BOŞLUK (SPACE)</p>
        <p>• Hızlı Koşma: SOL SHIFT</p>
        <p>• Eğlence / Dans: G Tuşu</p>
        <div id="power-bar"><div id="power-fill"></div></div>
    </div>

    <div id="stats">
        <h3>İSTATİSTİKLER</h3>
        <p>DÜŞME SAYISI: <span id="deaths" class="stat-val">0</span></p>
        <p>AKTİF CHECKPOINT: <span id="cp-stat" class="stat-val">Yok</span></p>
    </div>

    <script>
        // --- 1. SES SENTEZLEYİCİ ALTYAPISI ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f1, f2, type, d) {
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = type;
                osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
                if(f2) osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + d);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + d);
                osc.start(); osc.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        // --- 2. SAHNE, KAMERA VE RENDERER AYARLARI ---
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0xaaccff);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5ea, 0.6); dirLight.position.set(40, 80, 30); scene.add(dirLight);

        // --- 3. RETRO PİKSEL DOKU OLUŞTURUCU ---
        function createPixelTexture(base, noise, shadow) {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = base; ctx.fillRect(0, 0, 64, 64);
            for (let x = 0; x < 64; x++) {
                for (let y = 0; y < 64; y++) {
                    const r = Math.random();
                    if (r > 0.88) { ctx.fillStyle = noise; ctx.fillRect(x, y, 1, 1); }
                    else if (r < 0.12) { ctx.fillStyle = shadow; ctx.fillRect(x, y, 1, 1); }
                }
            }
            const t = new THREE.CanvasTexture(canvas); t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
            return t;
        }

        const grassTex = createPixelTexture('#3b8f21', '#4ca634', '#2d6d19');
        const stoneTex = createPixelTexture('#6b6b6b', '#828282', '#525252');
        const cpTex    = createPixelTexture('#e67e22', '#f39c12', '#d35400');
        const lavaTex  = createPixelTexture('#e74c3c', '#e67e22', '#c0392b');
        const diamondTex = createPixelTexture('#1abc9c', '#2ecc71', '#16a085');
        const skinTex  = createPixelTexture('#f3c19f', '#faebd7', '#e0aa85');
        const shirtTex = createPixelTexture('#2980b9', '#3498db', '#1f6391');
        const pantsTex = createPixelTexture('#2c3e50', '#34495e', '#1a252f');

        // --- 4. MAP DÜNYASI VE BLOKLAR ---
        const blocks = [];
        function createBlock(x, y, z, w, h, d, tex, isCP=false, isFinish=false) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ map: tex }));
            mesh.position.set(x, y, z); scene.add(mesh);
            const b = { mesh: mesh, minX: x-w/2, maxX: x+w/2, topY: y+h/2, minZ: z-d/2, maxZ: z+d/2, isCP: isCP, isFinish: isFinish, spawn: {x:x, y:y+h/2, z:z}, isMoving: false, startX: x };
            blocks.push(b); return b;
        }

        // Geniş Başlangıç Lobisi
        createBlock(0, -1, 15, 30, 2, 30, grassTex); 

        // Havada Dönüp Duran Süper Ayakkabı İtemi
        const bootItem = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true }));
        bootItem.position.set(0, 1, 15); scene.add(bootItem);

        // Parkur Elementleri
        createBlock(0, 0, -2, 4, 2, 4, stoneTex);
        createBlock(0, 1, -9, 2.5, 2, 2.5, stoneTex);
        createBlock(3, 2, -15, 2.5, 2, 2.5, stoneTex);
        createBlock(0, 3, -22, 4, 2, 4, cpTex, true); // Checkpoint 1

        // Sağa Sola Kayan Gizemli Platform
        const movingBlock = createBlock(-3, 4, -29, 2.5, 1, 2.5, stoneTex);
        movingBlock.isMoving = true;

        createBlock(2, 5, -36, 2.5, 2, 2.5, stoneTex);
        createBlock(2, 6.5, -43, 4, 2, 4, cpTex, true); // Checkpoint 2
        createBlock(-2, 7.5, -50, 2.5, 2, 2.5, stoneTex);
        createBlock(1, 8.5, -57, 2.5, 2, 2.5, stoneTex);
        createBlock(0, 9.5, -66, 6, 2, 6, diamondTex, false, true); // Bitiş Elması

        // Sonsuz Lav Denizi
        createBlock(0, -25, -20, 1200, 1, 1200, lavaTex);

        // --- 5. DETAYLI MAHMUT KARAKTER MODELİ ---
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshLambertMaterial({ map: shirtTex })); body.position.y = 1.0; playerGroup.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshLambertMaterial({ map: skinTex })); head.position.y = 1.9; playerGroup.add(head);

        const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.28), new THREE.MeshLambertMaterial({ map: shirtTex })); lArm.position.set(-0.55, 1.0, 0); playerGroup.add(lArm);
        const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.28), new THREE.MeshLambertMaterial({ map: shirtTex })); rArm.position.set(0.55, 1.0, 0); playerGroup.add(rArm);
        const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.28), new THREE.MeshLambertMaterial({ map: pantsTex })); lLeg.position.set(-0.22, 0.4, 0); playerGroup.add(lLeg);
        const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.28), new THREE.MeshLambertMaterial({ map: pantsTex })); rLeg.position.set(0.22, 0.4, 0); playerGroup.add(rLeg);

        playerGroup.position.set(0, 0, 20); scene.add(playerGroup);

        // --- 6. FİZİK PARAMETRELERİ VE KONTROL TAKİBİ ---
        let velY = 0, grounded = true, deaths = 0;
        let respawnPoint = { x: 0, y: 0, z: 20 };
        let jumpPower = 0.16;
        let powerUpTimer = 0;

        let isDancing = false, danceTimer = 0;

        const keys = {};
        window.addEventListener('keydown', e => { if(audioCtx.state==='suspended') audioCtx.resume(); keys[e.code] = true; });
        window.addEventListener('keyup', e => keys[e.code] = false);

        document.body.addEventListener('click', () => { document.body.pointerLockElement || document.body.requestPointerLock(); });

        let camRotX = 0.2, camRotY = 0;
        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                camRotY -= e.movementX * 0.003; camRotX += e.movementY * 0.003;
                camRotX = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotX));
            }
        });

        // --- 7. OYUN DÖNGÜSÜ VE FİZİKSEL DOĞRULAMA ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // İtem Animasyonları
            bootItem.rotation.y += delta * 2;
            bootItem.position.y = 1 + Math.sin(clock.getElapsedTime() * 3) * 0.15;

            // Kayan Platform Güncellemesi
            for(let b of blocks) {
                if(b.isMoving) {
                    let offset = Math.sin(clock.getElapsedTime() * 2) * 2;
                    b.mesh.position.x = b.startX + offset;
                    b.minX = b.mesh.position.x - 1.25; b.maxX = b.mesh.position.x + 1.25;
                }
            }

            // Temel Karakter Hız Hesaplamaları
            let currentSpeed = keys['ShiftLeft'] ? 0.14 : 0.08;
            let mx = 0, mz = 0;

            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotY).normalize();
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotY).normalize();

            if (keys['KeyW']) { mx += forward.x * currentSpeed; mz += forward.z * currentSpeed; }
            if (keys['KeyS']) { mx -= forward.x * currentSpeed; mz -= forward.z * currentSpeed; }
            if (keys['KeyA']) { mx -= right.x * currentSpeed; mz -= right.z * currentSpeed; }
            if (keys['KeyD']) { mx += right.x * currentSpeed; mz += right.z * currentSpeed; }

            // Herhangi bir hareket veya zıplama dansı iptal eder
            if (mx !== 0 || mz !== 0 || keys['Space']) {
                isDancing = false;
                body.position.y = 1.0; head.position.set(0, 1.9, 0);
                lArm.rotation.z = rArm.rotation.z = 0;
            }

            // Poz ve Uzuv Sallama Animasyonları
            if (!isDancing) {
                if ((mx !== 0 || mz !== 0) && grounded) {
                    let freq = keys['ShiftLeft'] ? 16 : 10;
                    let wave = Math.sin(clock.getElapsedTime() * freq) * 0.6;
                    lLeg.rotation.x = wave; rLeg.rotation.x = -wave;
                    lArm.rotation.x = -wave; rArm.rotation.x = wave;
                } else if (!grounded) {
                    lLeg.rotation.x = -0.2; rLeg.rotation.x = 0.2;
                    lArm.rotation.x = 0.4; rArm.rotation.x = -0.4;
                } else {
                    lLeg.rotation.x = rLeg.rotation.x = lArm.rotation.x = rArm.rotation.x = 0;
                }
            } else {
                // Efsane Dans Animasyonu Mekaniği
                danceTimer += delta * 20;
                let hop = Math.sin(danceTimer) * 0.15;
                body.position.y = 1.0 + hop; head.position.y = 1.9 + hop;
                head.position.x = Math.cos(danceTimer) * 0.2;
                lArm.rotation.z = Math.sin(danceTimer) * 1.2; rArm.rotation.z = -Math.sin(danceTimer) * 1.2;
                lLeg.rotation.x = Math.cos(danceTimer) * 0.5; rLeg.rotation.x = -Math.cos(danceTimer) * 0.5;
            }

            if (keys['KeyG'] && grounded) isDancing = true;

            // Fiziksel Pozisyon Değişimi
            playerGroup.position.x += mx; playerGroup.position.z += mz;
            if (mx !== 0 || mz !== 0) playerGroup.rotation.y = Math.atan2(mx, mz);

            // Yerçekimi Kuvveti
            velY -= 0.007; playerGroup.position.y += velY;
            let hit = false;

            // Blok Çarpışma Hesaplamaları (Collision)
            for (let b of blocks) {
                const px = playerGroup.position.x; const py = playerGroup.position.y; const pz = playerGroup.position.z;
                if (px >= b.minX - 0.4 && px <= b.maxX + 0.4 && pz >= b.minZ - 0.4 && pz <= b.maxZ + 0.4) {
                    if (py <= b.topY && py >= b.topY - 0.4 && velY <= 0) {
                        playerGroup.position.y = b.topY; velY = 0; grounded = true; hit = true;
                        
                        // Kayan platformun üstündeyken oyuncuyu da sürükle
                        if(b.isMoving) playerGroup.position.x += Math.sin(clock.getElapsedTime() * 2) * 0.05;

                        // Checkpoint Kaydı
                        if (b.isCP && respawnPoint.z !== b.spawn.z) {
                            respawnPoint = { x: b.spawn.x, y: b.spawn.y, z: b.spawn.z };
                            document.getElementById('cp-stat').innerText = `X:${b.spawn.x} Z:${b.spawn.z}`;
                            playSound(440, 880, 'sine', 0.2);
                        }

                        // Bitiş Kontrolü
                        if (b.isFinish) {
                            playSound(600, 1200, 'sine', 0.5);
                            alert("TEBRİKLER! PARKURU BİTİRDİNİZ! 🏆");
                            respawnPoint = { x: 0, y: 0, z: 20 };
                            playerGroup.position.set(0, 0, 20);
                            document.getElementById('cp-stat').innerText = "Yok";
                        }
                        break;
                    }
                }
            }
            if (!hit) grounded = false;

            // Zıplama Emri
            if (keys['Space'] && grounded && !isDancing) {
                velY = jumpPower; grounded = false;
                playSound(150, 300, 'triangle', 0.15);
            }

            // Süper Ayakkabı İtem Toplama Kontrolü
            if (playerGroup.position.distanceTo(bootItem.position) < 1.2 && powerUpTimer <= 0) {
                jumpPower = 0.24; powerUpTimer = 5.0;
                playSound(300, 600, 'sine', 0.3);
                document.getElementById('power-bar').style.display = 'block';
            }

            // Eşya Süre Sayacı Yönetimi
            if (powerUpTimer > 0) {
                powerUpTimer -= delta;
                document.getElementById('power-fill').style.width = (powerUpTimer / 5.0) * 100 + '%';
                if (powerUpTimer <= 0) {
                    jumpPower = 0.16;
                    document.getElementById('power-bar').style.display = 'none';
                }
            }

            // Lav Boşluğuna Düşüş Kontrolü
            if (playerGroup.position.y < -15) {
                deaths++; document.getElementById('deaths').innerText = deaths;
                playSound(120, 60, 'sawtooth', 0.25);
                playerGroup.position.set(respawnPoint.x, respawnPoint.y, respawnPoint.z);
                velY = 0; grounded = true;
            }

            // 3. Şahıs Kamera Takip Sistemi (Kameranın Karakteri İzlemesi)
            const cx = playerGroup.position.x - Math.sin(camRotY) * Math.cos(camRotX) * 7;
            const cy = playerGroup.position.y + 2.0 + Math.sin(camRotX) * 7;
            const cz = playerGroup.position.z - Math.cos(camRotY) * Math.cos(camRotX) * 7;
            camera.position.set(cx, cy, cz);
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.0, playerGroup.position.z);

            renderer.render(scene, camera);
        }

        // Ekran Yeniden Boyutlandırma Adaptasyonu
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
