<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Futbol Pro v3 - Optimize</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none;}
        #canvas-container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 10px 30px;
            border: 4px solid #fff;
        }
        #controls-info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 13px;
            pointer-events: none;
            border: 2px solid #555;
            line-height: 1.5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">MAVİ: 0 | KIRMIZI: 0<br><span id="mode-text" style="font-size: 16px; color: #ffeb3b;">1 Oyuncu Modu ('2' tuşu ile 2 Kişilik yap)</span></div>
    <div id="controls-info">
        <b>[KONTROLLER]</b><br>
        <b>P1 (Mavi):</b> WASD + Boşluk (Zıpla) + Sağ Tık (Şut) + G (Dans)<br>
        <b>P2 (Kırmızı):</b> Yön Tuşları + Enter (Zıpla) + Sol Tık VEYA Ctrl (Şut) + L (Dans)<br>
        <b>Kamera:</b> Sol Tıka basılı tutarak fareyi çevir.
    </div>
    <div id="canvas-container"></div>

    <script>
        // --- SAHNE VE AYARLAR ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5c94fc); // Gökyüzü
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" }); // Kasma önleyici ayar
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Performans dostu ışıklandırma (Gölge hesaplamaları tamamen kaldırıldı)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- DOKUÜRETİCİSİ ---
        function createCharacterTexture(mainColorHex, isFace) {
            const canvas = document.createElement('canvas');
            canvas.width = 32; // Daha düşük çözünürlük = daha yüksek performans
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = mainColorHex;
            ctx.fillRect(0, 0, 32, 32);
            
            // Hafif Minecraft gürültüsü
            for (let i = 0; i < 32; i += 4) {
                for (let j = 0; j < 32; j += 4) {
                    if (Math.random() > 0.7) {
                        ctx.fillStyle = 'rgba(0,0,0,0.06)';
                        ctx.fillRect(i, j, 4, 4);
                    }
                }
            }

            if (isFace) {
                ctx.fillStyle = '#ffdbac'; 
                ctx.fillRect(8, 8, 16, 24);
                ctx.fillStyle = '#fff'; // Gözler
                ctx.fillRect(10, 14, 4, 4);
                ctx.fillRect(18, 14, 4, 4);
                ctx.fillStyle = '#4caf50'; 
                ctx.fillRect(12, 14, 2, 4);
                ctx.fillRect(18, 14, 2, 4);
                ctx.fillStyle = '#5c4033'; // Ağız
                ctx.fillRect(12, 22, 8, 2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        const blueShirtTex = createCharacterTexture('#2196f3', false);
        const redShirtTex = createCharacterTexture('#f44336', false);
        const skinTex = createCharacterTexture('#ffdbac', false);
        const faceTex = createCharacterTexture('#ffdbac', true);
        const ballTex = createCharacterTexture('#ffffff', false);

        const p1Mat = new THREE.MeshLambertMaterial({ map: blueShirtTex });
        const p2Mat = new THREE.MeshLambertMaterial({ map: redShirtTex });
        const skinMat = new THREE.MeshLambertMaterial({ map: skinTex });
        const faceMaterial = new THREE.MeshLambertMaterial({ map: faceTex });
        
        function getHeadMaterials(shirtMat) {
            return [shirtMat, shirtMat, shirtMat, shirtMat, faceMaterial, shirtMat];
        }

        // --- STADYUM VE SAHA ---
        const greenMat = new THREE.MeshLambertMaterial({ color: 0x4caf50 });
        const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

        const field = new THREE.Mesh(new THREE.BoxGeometry(50, 1, 70), greenMat);
        field.position.y = -0.5;
        scene.add(field);

        // Basit tribünler
        for (let i = 0; i < 3; i++) {
            const stand = new THREE.Mesh(new THREE.BoxGeometry(60, 2 + i * 2, 5), new THREE.MeshLambertMaterial({color: 0x555555}));
            stand.position.set(0, (2 + i * 2)/2 - 0.5, -38 - i * 4);
            scene.add(stand);

            const standR = stand.clone();
            standR.position.z = 38 + i * 4;
            scene.add(standR);
        }

        function createGoal(zPos) {
            const goalGroup = new THREE.Group();
            const postGeo = new THREE.BoxGeometry(1, 7, 1);
            const barGeo = new THREE.BoxGeometry(16, 1, 1);
            const lp = new THREE.Mesh(postGeo, whiteMat); lp.position.set(-8, 3.5, 0);
            const rp = new THREE.Mesh(postGeo, whiteMat); rp.position.set(8, 3.5, 0);
            const topBar = new THREE.Mesh(barGeo, whiteMat); topBar.position.set(0, 7, 0);
            goalGroup.add(lp, rp, topBar);
            goalGroup.position.set(0, 0, zPos);
            scene.add(goalGroup);
        }
        createGoal(-35); createGoal(35);

        // --- KARAKTER MODELLEME ---
        function buildMinecraftCharacter(shirtMat) {
            const charGroup = new THREE.Group();

            // Gövde
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.0, 0.8), shirtMat);
            body.position.y = 2.0;
            charGroup.add(body);

            // Kafa
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), getHeadMaterials(shirtMat));
            head.position.y = 3.6;
            charGroup.add(head);

            // Kollar (Omuz hizasından pivotlama)
            const leftArmPivot = new THREE.Group(); leftArmPivot.position.set(-1.0, 2.8, 0);
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.6, 0.6), skinMat);
            leftArm.position.y = -0.8; leftArmPivot.add(leftArm); charGroup.add(leftArmPivot);

            const rightArmPivot = new THREE.Group(); rightArmPivot.position.set(1.0, 2.8, 0);
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.6, 0.6), skinMat);
            rightArm.position.y = -0.8; rightArmPivot.add(rightArm); charGroup.add(rightArmPivot);

            // Bacaklar (Kalça hizasından pivotlama)
            const leftLegPivot = new THREE.Group(); leftLegPivot.position.set(-0.4, 1.0, 0);
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.4, 0.6), shirtMat);
            leftLeg.position.y = -0.7; leftLegPivot.add(leftLeg); charGroup.add(leftLegPivot);

            const rightLegPivot = new THREE.Group(); rightLegPivot.position.set(0.4, 1.0, 0);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.4, 0.6), shirtMat);
            rightLeg.position.y = -0.7; rightLegPivot.add(rightLeg); charGroup.add(rightLegPivot);

            scene.add(charGroup);

            return {
                root: charGroup,
                leftArm: leftArmPivot, rightArm: rightArmPivot,
                leftLeg: leftLegPivot, rightLeg: rightLegPivot
            };
        }

        const player1 = buildMinecraftCharacter(p1Mat); player1.root.position.set(-4, 0, 20);
        const player2 = buildMinecraftCharacter(p2Mat); player2.root.position.set(4, 0, 20); player2.root.visible = false;
        
        const botKeeperNorth = buildMinecraftCharacter(p2Mat); botKeeperNorth.root.position.set(0, 0, -33);
        const botKeeperSouth = buildMinecraftCharacter(p1Mat); botKeeperSouth.root.position.set(0, 0, 33);

        const ball = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1.4), new THREE.MeshLambertMaterial({ map: ballTex }));
        scene.add(ball);

        // --- OYUN VERİLERİ ---
        let isTwoPlayer = false;
        let score = { blue: 0, red: 0 };
        
        const data = {
            p1: { obj: player1, pos: player1.root.position, vel: new THREE.Vector3(), isGrounded: true, dancing: false, walkCycle: 0 },
            p2: { obj: player2, pos: player2.root.position, vel: new THREE.Vector3(), isGrounded: true, dancing: false, walkCycle: 0 },
            botNorth: { obj: botKeeperNorth, pos: botKeeperNorth.root.position, side: -1 },
            botSouth: { obj: botKeeperSouth, pos: botKeeperSouth.root.position, side: 1 },
            ball: { pos: ball.position, vel: new THREE.Vector3() }
        };

        function resetBall() {
            data.ball.pos.set(0, 5, 0);
            data.ball.vel.set(0, 0, 0);
        }
        resetBall();

        // --- GİRİŞ DİNLEYİCİLERİ ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Digit2') {
                isTwoPlayer = true;
                player2.root.visible = true;
                document.getElementById('mode-text').innerText = "2 Oyuncu Modu Aktif";
            }
            if (e.code === 'KeyG') data.p1.dancing = !data.p1.dancing;
            if (e.code === 'KeyL' && isTwoPlayer) data.p2.dancing = !data.p2.dancing;
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Kamera Döndürme
        let isMouseDown = false;
        let mouseX = 0, mouseY = 0;
        let cameraAngleX = 0;
        let cameraAngleY = 0.4;
        const cameraRadius = 18;

        window.addEventListener('mousedown', (e) => { if (e.button === 0) { isMouseDown = true; mouseX = e.clientX; mouseY = e.clientY; } });
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            cameraAngleX -= (e.clientX - mouseX) * 0.007;
            cameraAngleY = Math.max(0.1, Math.min(Math.PI/2 - 0.1, cameraAngleY + (e.clientY - mouseY) * 0.007));
            mouseX = e.clientX; mouseY = e.clientY;
        });
        window.addEventListener('mouseup', (e) => { if (e.button === 0) isMouseDown = false; });
        window.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('mousedown', (e) => {
            if (e.button === 2) kickBall(data.p1);
            if (e.button === 0 && isTwoPlayer && !isMouseDown) kickBall(data.p2);
        });

        function kickBall(playerData) {
            if (playerData.pos.distanceTo(data.ball.pos) < 3.5) {
                let dir = new THREE.Vector3().subVectors(data.ball.pos, playerData.pos).normalize();
                dir.y = 0.35;
                data.ball.vel.copy(dir.multiplyScalar(15));
            }
        }

        // --- OYUN DÖNGÜSÜ ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            // P1 Hareket Kontrolü
            let p1Moving = false;
            if (!data.p1.dancing) {
                let mx = 0, mz = 0;
                if (keys['KeyW']) mz -= 1;
                if (keys['KeyS']) mz += 1;
                if (keys['KeyA']) mx -= 1;
                if (keys['KeyD']) mx += 1;

                if (mx !== 0 || mz !== 0) {
                    p1Moving = true;
                    let dir = new THREE.Vector3(mx, 0, mz).normalize();
                    data.p1.pos.add(dir.multiplyScalar(9 * dt));
                    player1.root.rotation.y = Math.atan2(-mx, -mz);
                    data.p1.walkCycle += dt * 10; // Animasyon hızı
                }
                if (keys['Space'] && data.p1.isGrounded) { data.p1.vel.y = 10; data.p1.isGrounded = false; }
            }

            // P2 Hareket Kontrolü
            let p2Moving = false;
            if (isTwoPlayer && !data.p2.dancing) {
                let mx = 0, mz = 0;
                if (keys['ArrowUp']) mz -= 1;
                if (keys['ArrowDown']) mz += 1;
                if (keys['ArrowLeft']) mx -= 1;
                if (keys['ArrowRight']) mx += 1;

                if (mx !== 0 || mz !== 0) {
                    p2Moving = true;
                    let dir = new THREE.Vector3(mx, 0, mz).normalize();
                    data.p2.pos.add(dir.multiplyScalar(9 * dt));
                    player2.root.rotation.y = Math.atan2(-mx, -mz);
                    data.p2.walkCycle += dt * 10;
                }
                if (keys['Enter'] && data.p2.isGrounded) { data.p2.vel.y = 10; data.p2.isGrounded = false; }
                if (keys['ControlLeft']) kickBall(data.p2);
            }

            // --- ANIMASYONLARI UYGULAMA ---
            function applyLimbAnimations(pData, isMoving) {
                if (pData.dancing) {
                    let danceTime = clock.getElapsedTime() * 8;
                    pData.pos.y = Math.abs(Math.sin(danceTime)) * 1.2;
                    pData.obj.leftArm.rotation.x = -Math.PI/1.2 + Math.sin(danceTime) * 0.5;
                    pData.obj.rightArm.rotation.x = -Math.PI/1.2 - Math.sin(danceTime) * 0.5;
                    pData.obj.leftLeg.rotation.x = Math.sin(danceTime) * 0.2;
                    pData.obj.rightLeg.rotation.x = -Math.sin(danceTime) * 0.2;
                } else if (isMoving) {
                    // Yürüme sallantısı (Düzeltildi)
                    let angle = Math.sin(pData.walkCycle);
                    pData.obj.leftArm.rotation.x = angle * 0.7;
                    pData.obj.rightArm.rotation.x = -angle * 0.7;
                    pData.obj.leftLeg.rotation.x = -angle * 0.6;
                    pData.obj.rightLeg.rotation.x = angle * 0.6;
                    if(pData.isGrounded) pData.pos.y = Math.abs(Math.sin(pData.walkCycle * 2)) * 0.15; // Yürürken hafif yaylanma
                } else {
                    // Dururken sıfırla
                    pData.obj.leftArm.rotation.x = 0; pData.obj.rightArm.rotation.x = 0;
                    pData.obj.leftLeg.rotation.x = 0; pData.obj.rightLeg.rotation.x = 0;
                }
            }
            applyLimbAnimations(data.p1, p1Moving);
            applyLimbAnimations(data.p2, p2Moving);

            // Kaleci Botları Yapay Zekası
            function runKeeper(botData) {
                let targetX = Math.max(-7, Math.min(7, data.ball.pos.x));
                let diff = targetX - botData.pos.x;
                if (Math.abs(diff) > 0.1) {
                    botData.pos.x += Math.sign(diff) * 5 * dt;
                    let speed = clock.getElapsedTime() * 12;
                    botData.obj.leftLeg.rotation.x = Math.sin(speed) * 0.5;
                    botData.obj.rightLeg.rotation.x = -Math.sin(speed) * 0.5;
                } else {
                    botData.obj.leftLeg.rotation.x = 0; botData.obj.rightLeg.rotation.x = 0;
                }

                if (botData.pos.distanceTo(data.ball.pos) < 3.2) {
                    data.ball.vel.set((Math.random() - 0.5) * 5, 5, botData.side * -16);
                }
            }
            runKeeper(data.botNorth);
            runKeeper(data.botSouth);

            // Fizik & Yerçekimi (Oyuncular)
            if (!data.p1.isGrounded) {
                data.p1.vel.y -= 26 * dt; data.p1.pos.y += data.p1.vel.y * dt;
                if (data.p1.pos.y <= 0) { data.p1.pos.y = 0; data.p1.isGrounded = true; }
            }
            if (isTwoPlayer && !data.p2.isGrounded) {
                data.p2.vel.y -= 26 * dt; data.p2.pos.y += data.p2.vel.y * dt;
                if (data.p2.pos.y <= 0) { data.p2.pos.y = 0; data.p2.isGrounded = true; }
            }

            // Top Fiziği
            data.ball.vel.y -= 15 * dt;
            data.ball.pos.addScaledVector(data.ball.vel, dt);

            if (data.ball.pos.y < 0.7) {
                data.ball.pos.y = 0.7;
                data.ball.vel.y = -data.ball.vel.y * 0.6;
                data.ball.vel.x *= 0.96; data.ball.vel.z *= 0.96;
            }

            ball.rotation.x += data.ball.vel.z * dt * 0.2;
            ball.rotation.z -= data.ball.vel.x * dt * 0.2;

            // Gol Sınırları Kontrolü
            if (Math.abs(data.ball.pos.x) > 25 || Math.abs(data.ball.pos.z) > 35) {
                if (data.ball.pos.z < -35 && Math.abs(data.ball.pos.x) < 8 && data.ball.pos.y < 7) {
                    score.blue++; updateUI(); resetBall();
                } else if (data.ball.pos.z > 35 && Math.abs(data.ball.pos.x) < 8 && data.ball.pos.y < 7) {
                    score.red++; updateUI(); resetBall();
                } else {
                    resetBall();
                }
            }

            // Arka Kamera Takibi
            let target = data.p1.pos;
            camera.position.x = target.x + cameraRadius * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.z = target.z + cameraRadius * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.y = target.y + cameraRadius * Math.sin(cameraAngleY) + 2.5;
            camera.lookAt(target.x, target.y + 1.8, target.z);

            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('ui').innerHTML = `MAVİ: ${score.blue} | KIRMIZI: ${score.red}<br><span id="mode-text" style="font-size: 16px; color: #ffeb3b;">${isTwoPlayer ? '2 Oyuncu Modu Aktif' : "1 Oyuncu Modu ('2' tuşu ile 2 Kişilik yap)"}</span>`;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
