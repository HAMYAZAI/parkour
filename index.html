<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Minecraft & Roblox Web Parkur</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 5px; border: 2px solid #555; pointer-events: none; }
        h3 { margin: 0 0 10px 0; color: #55ff55; text-shadow: 1px 1px #000; }
        p { margin: 5px 0; font-size: 14px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h3>CRAFT-BOX PARKUR</h3>
        <p><b>HAREKET:</b> W, A, S, D</p>
        <p><b>KAMERA:</b> SAĞ TIKLA BASILI TUT + MOUSE DÖNDÜR</p>
        <p><b>ZIPLAMA:</b> SPACE</p>
        <p><b>DEPAR:</b> SHIFT | <b>DANS:</b> G</p>
        <hr style="border-color: #444;">
        <p id="checkpoint-text" style="color: #55ff55; font-weight: bold;">Durum: Başlamaya Hazır!</p>
    </div>

    <script>
        // --- 1. SAHNE VE KAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee); // Gökyüzü

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Işıklar
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // --- 2. DİNAMİK PIXELLI TEXTURE PACK GENERATOR ---
        // İnternetten resim yüklemek yerine kodla Minecraft tarzı pikselli dokular üretiyoruz
        function createPixelTexture(baseColor, noiseColor, size = 16) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, size, size);
            
            // Rastgele pikseller ekleyerek Minecraft dokusu havası veriyoruz
            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    if (Math.random() > 0.6) {
                        ctx.fillStyle = noiseColor;
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            
            // Blok kenarlarına gölge çizgisi
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.strokeRect(0, 0, size, size);

            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // Piksellerin bulanıklaşmasını önler (Retro durur)
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        // Dokuları Oluşturma
        const grassTex = createPixelTexture('#5cc43c', '#4da332'); // Çimen
        const stoneTex = createPixelTexture('#737373', '#5a5a5a'); // Taş
        const cpTex = createPixelTexture('#ff9900', '#cc7a00');    // Checkpoint
        const lavaTex = createPixelTexture('#ff3300', '#ff6600');  // Lav
        const skinTex = createPixelTexture('#ffdbb5', '#e0bfa2');  // Ten

        // --- 3. HARİTA İNŞASI ---
        const blocks = [];
        const checkpoints = [{ x: 0, y: 0.5, z: -22 }];

        function createBlock(x, y, z, w, h, d, texture, isLava = false) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshLambertMaterial({ map: texture });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            
            blocks.push({
                mesh: mesh, minX: x - w/2, maxX: x + w/2,
                minY: y + h/2, minZ: z - d/2, maxZ: z + d/2,
                texture: texture, isLava: isLava
            });
            return mesh;
        }

        // Dünyayı Kuruyoruz
        createBlock(0, -1, 0, 6, 2, 6, grassTex);       // Başlangıç
        createBlock(0, 0, -8, 2, 2, 2, stoneTex);       // 1. Taş Blok
        createBlock(3, 1, -15, 2, 2, 2, stoneTex);      // 2. Taş Blok
        createBlock(0, 2, -22, 4, 2, 4, cpTex);         // CHECKPOINT
        createBlock(-4, 3, -30, 2, 2, 2, stoneTex);     // Zorlu Blok
        createBlock(0, 4, -37, 4, 2, 4, grassTex);     // Bitiş Platformu

        // Dev Lav Denizi
        createBlock(0, -20, -15, 400, 1, 400, lavaTex, true);

        // --- 4. OYUNCU KARAKTERİ (Gelişmiş Doku ve Yüz) ---
        const playerGroup = new THREE.Group();
        
        // Gövde (Mavi Tişörtlü)
        const bodyGeo = new THREE.BoxGeometry(1, 1.4, 0.6);
        const bodyMat = new THREE.MeshLambertMaterial({ map: createPixelTexture('#00aaff', '#0088cc') });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.7;
        playerGroup.add(body);

        // Kafa (Yüz Detaylı)
        const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const headMaterials = [
            new THREE.MeshLambertMaterial({ map: skinTex }), // sağ
            new THREE.MeshLambertMaterial({ map: skinTex }), // sol
            new THREE.MeshLambertMaterial({ map: skinTex }), // üst
            new THREE.MeshLambertMaterial({ map: skinTex }), // alt
            // ÖN YÜZ (Gözler ve Ağız için özel piksel çizmeli)
            new THREE.MeshLambertMaterial({ map: (function(){
                const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffdbb5'; ctx.fillRect(0,0,16,16); // ten rengi
                ctx.fillStyle = '#fff'; ctx.fillRect(2,5,3,2); ctx.fillRect(11,5,3,2); // göz beyazı
                ctx.fillStyle = '#422', ctx.fillRect(3,5,2,2); ctx.fillRect(11,5,2,2); // göz bebeği
                ctx.fillStyle = '#aa4444'; ctx.fillRect(5,10,6,2); // ağız
                const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
            })() }),
            new THREE.MeshLambertMaterial({ map: skinTex })  // arka
        ];
        const head = new THREE.Mesh(headGeo, headMaterials);
        head.position.y = 1.7;
        playerGroup.add(head);

        playerGroup.position.set(0, 0, 0); 
        scene.add(playerGroup);

        // --- 5. ROBLOX TARZI KAMERA VE KONTROL SİSTEMİ ---
        const keys = {};
        let velocityY = 0; 
        let isGrounded = true;
        let isDancing = false;
        let danceTimer = 0;
        let hasCheckpoint = false;

        // Kamera Açıları (Roblox mantığı)
        let camRotationX = 0; // Yukarı-Aşağı bakış
        let camRotationY = 0; // Sağ-Sol döngüsü
        let isRightMouseDown = false;
        let camDistance = 7;   // Karakterden uzaklık

        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Sağ tık menüsünü engelle (Roblox'taki gibi rahat dönsün diye)
        window.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('mousedown', (e) => {
            if (e.button === 2) isRightMouseDown = true; // Sağ tık basıldı
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 2) isRightMouseDown = false; // Sağ tık bırakıldı
        });

        window.addEventListener('mousemove', (e) => {
            if (isRightMouseDown) {
                // Fare hareketine göre kamera açılarını değiştir
                camRotationY -= e.movementX * 0.005;
                camRotationX -= e.movementY * 0.005;
                
                // Yukarı aşağı bakış sınırları (Kamera takla atmasın)
                camRotationX = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotationX));
            }
        });

        // --- 6. OYUN DÖNGÜSÜ ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            let speed = keys['ShiftLeft'] ? 0.15 : 0.08; 
            let moveX = 0;
            let moveZ = 0;

            if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'] || keys['Space']) {
                isDancing = false;
                body.position.y = 0.7;
                head.position.x = 0;
            }

            if (!isDancing) {
                // Kameranın baktığı açıya göre hareket yönünü hesapla
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotationY);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotationY);

                if (keys['KeyW']) { moveX += forward.x * speed; moveZ += forward.z * speed; }
                if (keys['KeyS']) { moveX -= forward.x * speed; moveZ -= forward.z * speed; }
                if (keys['KeyA']) { moveX -= right.x * speed; moveZ -= right.z * speed; }
                if (keys['KeyD']) { moveX += right.x * speed; moveZ += right.z * speed; }

                playerGroup.position.x += moveX;
                playerGroup.position.z += moveZ;

                // Karakter hareket ediyorsa bastığı yöne baksın
                if (moveX !== 0 || moveZ !== 0) {
                    playerGroup.rotation.y = Math.atan2(moveX, moveZ);
                }
            } else {
                danceTimer += delta * 15;
                body.position.y = 0.7 + Math.sin(danceTimer) * 0.15;
                head.position.x = Math.cos(danceTimer) * 0.2;
            }

            if (keys['KeyG'] && isGrounded) isDancing = true;

            // Fizik ve Yerçekimi
            velocityY -= 0.008; 
            playerGroup.position.y += velocityY;
            
            let hitAnyBlock = false;
            const px = playerGroup.position.x;
            const py = playerGroup.position.y;
            const pz = playerGroup.position.z;

            for (let block of blocks) {
                if (px >= block.minX - 0.4 && px <= block.maxX + 0.4 &&
                    pz >= block.minZ - 0.4 && pz <= block.maxZ + 0.4) {
                    
                    if (py <= block.minY && py >= block.minY - 0.5) {
                        playerGroup.position.y = block.minY;
                        velocityY = 0;
                        isGrounded = true;
                        hitAnyBlock = true;

                        if (block.texture === cpTex) {
                            hasCheckpoint = true;
                            document.getElementById('checkpoint-text').innerText = "Durum: Checkpoint Kaydedildi!";
                            document.getElementById('checkpoint-text').style.color = "#ffaa00";
                        }
                        break;
                    }
                }
            }

            if (!hitAnyBlock) isGrounded = false;

            if (keys['Space'] && isGrounded && !isDancing) {
                velocityY = 0.18; 
                isGrounded = false;
            }

            // Düştüğünde Yeniden Doğma
            if (playerGroup.position.y < -10) {
                if (hasCheckpoint) {
                    playerGroup.position.set(checkpoints[0].x, checkpoints[0].y, checkpoints[0].z);
                } else {
                    playerGroup.position.set(0, 0, 0);
                }
                velocityY = 0;
                isGrounded = true;
            }

            // --- ROBLOX TARZI KAMERA HESAPLAMASI ---
            // Kamerayı karakterin etrafında küresel (spherical) olarak döndürüyoruz
            const targetX = playerGroup.position.x - Math.sin(camRotationY) * Math.cos(camRotationX) * camDistance;
            const targetY = playerGroup.position.y + 2.5 + Math.sin(camRotationX) * camDistance;
            const targetZ = playerGroup.position.z - Math.cos(camRotationY) * Math.cos(camRotationX) * camDistance;

            camera.position.set(targetX, targetY, targetZ);
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.2, playerGroup.position.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
