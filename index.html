<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Web Parkur - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 5px; border: 2px solid #555; pointer-events: none; }
        #stats { position: absolute; top: 10px; right: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 5px; border: 2px solid #555; pointer-events: none; text-align: right; }
        h3 { margin: 0 0 10px 0; color: #55ff55; text-shadow: 1px 1px #000; }
        p { margin: 5px 0; font-size: 14px; }
        .stat-val { color: #ffcc00; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h3>CRAFT-BOX PARKUR v4</h3>
        <p><b>HAREKET:</b> W, A, S, D | <b>ZIPLAMA:</b> SPACE</p>
        <p><b>KAMERA:</b> SAĞ TIKLA + MOUSE</p>
        <p><b>DEPAR:</b> SHIFT | <b>DANS:</b> G</p>
        <hr style="border-color: #444;">
        <p id="checkpoint-text" style="color: #55ff55; font-weight: bold;">Durum: Koşmaya Başla!</p>
    </div>

    <div id="stats">
        <h3>İSTATİSTİKLER</h3>
        <p>SÜRE: <span id="timer-val" class="stat-val">0.0</span> sn</p>
        <p>ÖLÜM: <span id="death-val" class="stat-val" style="color: #ff5555;">0</span></p>
    </div>

    <script>
        // --- 1. SES SENTEZLEYİCİ (Minecraft Sesleri - Dosyasız) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playJumpSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function playDeathSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, audioCtx.currentTime);
            osc.frequency.setValueAtTime(60, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        function playWinSound() {
            const notes = [261.63, 329.63, 392.00, 523.25];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }, i * 150);
            });
        }

        // --- 2. SAHNE VE KAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(40, 80, 30);
        scene.add(dirLight);

        // --- 3. PIXEL TEXTURE PACK ---
        function createPixelTexture(baseColor, noiseColor, size = 16) {
            const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor; ctx.fillRect(0, 0, size, size);
            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    if (Math.random() > 0.6) { ctx.fillStyle = noiseColor; ctx.fillRect(x, y, 1, 1); }
                }
            }
            ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.strokeRect(0, 0, size, size);
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        const grassTex = createPixelTexture('#5cc43c', '#4da332'); 
        const stoneTex = createPixelTexture('#737373', '#5a5a5a'); 
        const cpTex = createPixelTexture('#ff9900', '#cc7a00');    
        const lavaTex = createPixelTexture('#ff3300', '#ff6600');  
        const skinTex = createPixelTexture('#ffdbb5', '#e0bfa2');  
        const clothTex = createPixelTexture('#00aaff', '#0088cc'); 
        const pantsTex = createPixelTexture('#0055ff', '#0033aa'); 
        const diamondTex = createPixelTexture('#00ffcc', '#00ccaa');

        // --- 4. BULUTLAR (Minecraft Tarzı) ---
        const clouds = [];
        const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        for(let i=0; i<15; i++) {
            const cloudGeo = new THREE.BoxGeometry(10 + Math.random()*15, 2, 8 + Math.random()*10);
            const cloud = new THREE.Mesh(cloudGeo, cloudMat);
            cloud.position.set((Math.random()-0.5)*200, 25, -Math.random()*150);
            scene.add(cloud);
            clouds.push(cloud);
        }

        // --- 5. DEVASELAŞTIRILMIŞ HARİTA ---
        const blocks = [];
        let activeCheckpoint = { x: 0, y: 0, z: 0 }; 

        function createBlock(x, y, z, w, h, d, texture, isCP = false, isFinish = false) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshLambertMaterial({ map: texture });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            
            blocks.push({
                mesh: mesh, minX: x - w/2, maxX: x + w/2,
                topY: y + h/2, minZ: z - d/2, maxZ: z + d/2,
                texture: texture, isCP: isCP, isFinish: isFinish,
                spawnPoint: { x: x, y: (y + h/2), z: z }
            });
            return mesh;
        }

        // BÖLÜM 1: Başlangıç
        createBlock(0, -1, 0, 6, 2, 6, grassTex);       
        createBlock(0, 0, -8, 2, 2, 2, stoneTex);       
        createBlock(3, 1, -15, 2, 2, 2, stoneTex);      
        
        // CHECKPOINT 1
        createBlock(0, 2, -22, 4, 2, 4, cpTex, true);         

        // BÖLÜM 2: Tırmanış
        createBlock(-4, 3, -30, 2, 2, 2, stoneTex);     
        createBlock(-4, 4.5, -37, 2, 2, 2, stoneTex);   
        createBlock(1, 5.5, -44, 2, 2, 2, stoneTex);    
        createBlock(6, 6.5, -51, 2, 2, 2, stoneTex);    
        
        // CHECKPOINT 2 (Orta Kat)
        createBlock(6, 7.5, -59, 4, 2, 4, cpTex, true);

        // BÖLÜM 3: Zirveye Çıkış ve Çapraz Atlamalar
        createBlock(1, 8.5, -66, 2, 2, 2, stoneTex);
        createBlock(-4, 9.5, -73, 2, 2, 2, stoneTex);
        createBlock(-4, 11, -81, 2, 2, 2, stoneTex);
        createBlock(1, 12, -88, 2, 2, 2, stoneTex);
        createBlock(6, 13, -95, 1.5, 2, 1.5, stoneTex); // İyice daraldı bloklar!
        createBlock(0, 14, -102, 1.5, 2, 1.5, stoneTex);
        
        // DEV BİTİŞ PLATFORMU
        createBlock(0, 14.5, -114, 6, 2, 6, diamondTex, false, true);

        // Lav Denizi
        createBlock(0, -20, -50, 1000, 1, 1000, lavaTex);

        // --- 6. OYUNCU VE UZUVLAR ---
        const playerGroup = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
        const bodyMat = new THREE.MeshLambertMaterial({ map: clothTex });
        const body = new THREE.Mesh(bodyGeo, bodyMat); body.position.y = 1.0; playerGroup.add(body);

        const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const headMaterials = [
            new THREE.MeshLambertMaterial({ map: skinTex }), new THREE.MeshLambertMaterial({ map: skinTex }), 
            new THREE.MeshLambertMaterial({ map: skinTex }), new THREE.MeshLambertMaterial({ map: skinTex }), 
            new THREE.MeshLambertMaterial({ map: (function(){
                const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffdbb5'; ctx.fillRect(0,0,16,16); 
                ctx.fillStyle = '#fff'; ctx.fillRect(2,5,3,2); ctx.fillRect(11,5,3,2); 
                ctx.fillStyle = '#422', ctx.fillRect(3,5,2,2); ctx.fillRect(11,5,2,2); 
                ctx.fillStyle = '#aa4444'; ctx.fillRect(5,10,6,2); 
                const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
            })() }),
            new THREE.MeshLambertMaterial({ map: skinTex })  
        ];
        const head = new THREE.Mesh(headGeo, headMaterials); head.position.y = 1.9; playerGroup.add(head);

        const armMat = new THREE.MeshLambertMaterial({ map: clothTex });
        const legMat = new THREE.MeshLambertMaterial({ map: pantsTex });
        const limbGeo = new THREE.BoxGeometry(0.3, 0.8, 0.3);

        const leftArm = new THREE.Mesh(limbGeo, armMat); leftArm.position.set(-0.55, 1.0, 0); playerGroup.add(leftArm);
        const rightArm = new THREE.Mesh(limbGeo, armMat); rightArm.position.set(0.55, 1.0, 0); playerGroup.add(rightArm);
        const leftLeg = new THREE.Mesh(limbGeo, legMat); leftLeg.position.set(-0.25, 0.4, 0); playerGroup.add(leftLeg);
        const rightLeg = new THREE.Mesh(limbGeo, legMat); rightLeg.position.set(0.25, 0.4, 0); playerGroup.add(rightLeg);

        playerGroup.position.set(0, 0, 0); scene.add(playerGroup);

        // --- 7. SAYAÇLAR VE OYUN LOGIC DEĞİŞKENLERİ ---
        let totalTime = 0;
        let deathCount = 0;
        let gameFinished = false;

        const keys = {};
        let velocityY = 0; let isGrounded = true; let isDancing = false;
        let danceTimer = 0; let limbTimer = 0;

        let camRotationX = 0.2; let camRotationY = 0; let isRightMouseDown = false; let camDistance = 8;   

        window.addEventListener('keydown', (e) => { 
            if (audioCtx.state === 'suspended') audioCtx.resume(); // Ses motorunu tarayıcı engellemesinden kurtarır
            keys[e.code] = true; 
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('mousedown', (e) => { if (e.button === 2) isRightMouseDown = true; });
        window.addEventListener('mouseup', (e) => { if (e.button === 2) isRightMouseDown = false; });

        window.addEventListener('mousemove', (e) => {
            if (isRightMouseDown) {
                camRotationY -= e.movementX * 0.005;
                camRotationX += e.movementY * 0.005; 
                camRotationX = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotationX));
            }
        });

        // --- 8. ANA ANİMASYON DÖNGÜSÜ ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Süratli Zamanlayıcı Sistemi
            if (!gameFinished) {
                totalTime += delta;
                document.getElementById('timer-val').innerText = totalTime.toFixed(1);
            }

            // Bulutların Yavaşça Süzülmesi
            clouds.forEach(cloud => {
                cloud.position.x += delta * 2;
                if(cloud.position.x > 100) cloud.position.x = -100;
            });

            let speed = keys['ShiftLeft'] ? 0.15 : 0.09; 
            let moveX = 0; let moveZ = 0; let isMoving = false;

            if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'] || keys['Space']) {
                isDancing = false;
                body.position.y = 1.0; head.position.x = 0; head.position.y = 1.9;
            }

            if (!isDancing) {
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotationY);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotationY);

                if (keys['KeyW']) { moveX += forward.x * speed; moveZ += forward.z * speed; isMoving = true; }
                if (keys['KeyS']) { moveX -= forward.x * speed; moveZ -= forward.z * speed; isMoving = true; }
                if (keys['KeyA']) { moveX -= right.x * speed; moveZ -= right.z * speed; isMoving = true; }
                if (keys['KeyD']) { moveX += right.x * speed; moveZ += right.z * speed; isMoving = true; }

                playerGroup.position.x += moveX; playerGroup.position.z += moveZ;

                if (moveX !== 0 || moveZ !== 0) { playerGroup.rotation.y = Math.atan2(moveX, moveZ); }

                if (isMoving && isGrounded) {
                    limbTimer += delta * (keys['ShiftLeft'] ? 16 : 10);
                    leftLeg.rotation.x = Math.sin(limbTimer) * 0.6; rightLeg.rotation.x = -Math.sin(limbTimer) * 0.6;
                    leftArm.rotation.x = -Math.sin(limbTimer) * 0.6; rightArm.rotation.x = Math.sin(limbTimer) * 0.6;
                } else if (!isGrounded) {
                    leftLeg.rotation.x = -0.2; rightLeg.rotation.x = 0.2; leftArm.rotation.x = 0.4; rightArm.rotation.x = -0.4;
                } else {
                    leftLeg.rotation.x = 0; rightLeg.rotation.x = 0; leftArm.rotation.x = 0; rightArm.rotation.x = 0;
                }
            } else {
                danceTimer += delta * 20;
                body.position.y = 1.0 + Math.sin(danceTimer) * 0.15; head.position.x = Math.cos(danceTimer) * 0.2;
                leftArm.rotation.z = Math.sin(danceTimer) * 1.2; rightArm.rotation.z = -Math.sin(danceTimer) * 1.2;
                leftLeg.rotation.x = Math.cos(danceTimer) * 0.5; rightLeg.rotation.x = -Math.cos(danceTimer) * 0.5;
            }

            if (keys['KeyG'] && isGrounded) isDancing = true;

            // Yerçekimi Fizikleri
            velocityY -= 0.008; playerGroup.position.y += velocityY;
            let hitAnyBlock = false;
            const px = playerGroup.position.x; const py = playerGroup.position.y; const pz = playerGroup.position.z;

            for (let block of blocks) {
                if (px >= block.minX - 0.4 && px <= block.maxX + 0.4 && pz >= block.minZ - 0.4 && pz <= block.maxZ + 0.4) {
                    if (py <= block.topY && py >= block.topY - 0.4 && velocityY <= 0) {
                        playerGroup.position.y = block.topY;
                        velocityY = 0; isGrounded = true; hitAnyBlock = true;

                        // Checkpoint Kaydı
                        if (block.isCP) {
                            activeCheckpoint = { x: block.spawnPoint.x, y: block.spawnPoint.y, z: block.spawnPoint.z };
                            document.getElementById('checkpoint-text').innerText = "Durum: Checkpoint Güncellendi!";
                            document.getElementById('checkpoint-text').style.color = "#ffaa00";
                        }
                        
                        // Parkur Bitişi
                        if (block.isFinish && !gameFinished) {
                            gameFinished = true;
                            playWinSound();
                            document.getElementById('checkpoint-text').innerText = "GG! PARKUR BİTTİ! 🏆";
                            document.getElementById('checkpoint-text').style.color = "#00ffcc";
                        }
                        break;
                    }
                }
            }

            if (!hitAnyBlock) isGrounded = false;

            // Zıplama ve Ses Tetikleme
            if (keys['Space'] && isGrounded && !isDancing) {
                velocityY = 0.17; isGrounded = false;
                playJumpSound();
            }

            // Lav'a Düşüp Canlanma (Sesli)
            if (playerGroup.position.y < -10) {
                deathCount++;
                document.getElementById('death-val').innerText = deathCount;
                playDeathSound();
                
                playerGroup.position.set(activeCheckpoint.x, activeCheckpoint.y, activeCheckpoint.z);
                velocityY = 0; isGrounded = true;
            }

            // Kamera Görüşü
            const targetX = playerGroup.position.x - Math.sin(camRotationY) * Math.cos(camRotationX) * camDistance;
            const targetY = playerGroup.position.y + 2.5 + Math.sin(camRotationX) * camDistance;
            const targetZ = playerGroup.position.z - Math.cos(camRotationY) * Math.cos(camRotationX) * camDistance;

            camera.position.set(targetX, targetY, targetZ);
            camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.2, playerGroup.position.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
