<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Futbol - Minecraft Tarzı</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            text-align: center;
            pointer-events: none;
        }
        #controls-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
    <!-- Three.js Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">Mavi: 0 | Kırmızı: 0<br><span id="mode-text" style="font-size: 14px;">1 Oyuncu Modu (Aktif etmek için '2'ye bas)</span></div>
    <div id="controls-info">
        <b>P1 (Mavi):</b> WASD + Boşluk (Zıpla) + Sağ Tık (Şut) + G (Dans)<br>
        <b>P2 (Kırmızı):</b> Ok Tuşları + Enter (Zıpla) + Sol Tık/Ctrl (Şut) + L (Dans)<br>
        <b>Kamera:</b> Sol Tıka basılı tutarak fareyi oynat.
    </div>
    <div id="canvas-container"></div>

    <script>
        // --- KURULUM & SAHNE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Gökyüzü mavisi
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- OYUN AYARLARI ---
        let isTwoPlayer = false;
        let score = { blue: 0, red: 0 };
        
        // Kamera Kontrol Değişkenleri (Roblox Tarzı Sol Tık)
        let isMouseDown = false;
        let mouseX = 0, mouseY = 0;
        let cameraAngleX = 0;
        let cameraAngleY = 0.5; 
        const cameraRadius = 15;

        // Fiziğe Duyarlı Nesneler Dizisi
        let physicsObjects = [];

        // --- MALZEMELER (Minecraft Tarzı) ---
        const greenMat = new THREE.MeshLambertMaterial({ color: 0x4caf50 }); // Çimen
        const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff }); // Çizgiler/Kale
        const blueMat = new THREE.MeshLambertMaterial({ color: 0x2196f3 });  // P1
        const redMat = new THREE.MeshLambertMaterial({ color: 0xf44336 });   // P2 / Bot
        const ballMat = new THREE.MeshLambertMaterial({ color: 0xffffff });  // Top

        // --- DÜNYA OLUŞTURMA (SAHA & KALELER) ---
        // Saha Zemini
        const fieldGeo = new THREE.BoxGeometry(40, 1, 60);
        const field = new THREE.Mesh(fieldGeo, greenMat);
        field.position.y = -0.5;
        field.receiveShadow = true;
        scene.add(field);

        // Basit Kale Fonksiyonu (Küp parçalarından)
        function createGoal(zPos, color) {
            const goalGroup = new THREE.Group();
            const postGeo = new THREE.BoxGeometry(1, 6, 1);
            const barGeo = new THREE.BoxGeometry(12, 1, 1);
            
            const leftPost = new THREE.Mesh(postGeo, whiteMat);
            leftPost.position.set(-6, 3, 0);
            
            const rightPost = new THREE.Mesh(postGeo, whiteMat);
            rightPost.position.set(6, 3, 0);
            
            const crossbar = new THREE.Mesh(barGeo, whiteMat);
            crossbar.position.set(0, 6, 0);

            goalGroup.add(leftPost, rightPost, crossbar);
            goalGroup.position.set(0, 0, zPos);
            scene.add(goalGroup);
        }
        createGoal(-30); // Kuzey Kalesi
        createGoal(30);  // Güney Kalesi

        // --- AKTÖRLER (Karakterler, Bot ve Top) ---
        
        // Minecraft tarzı küp karakter yapıcı
        function createCubeCharacter(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 1), color);
            body.position.y = 1.5;
            body.castShadow = true;
            group.add(body);
            
            // Kafa
            const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), color);
            head.position.y = 3;
            head.castShadow = true;
            group.add(head);

            scene.add(group);
            return group;
        }

        const p1 = createCubeCharacter(blueMat);
        p1.position.set(-3, 0, 15);

        const p2 = createCubeCharacter(redMat);
        p2.position.set(3, 0, 15);
        p2.visible = false; // Başta 2. oyuncu gizli

        const botKeeper = createCubeCharacter(redMat);
        botKeeper.position.set(0, 0, -28); // Kuzey kalesinde bot kaleci

        // Top (Minecraft tarzı küp top)
        const ball = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), ballMat);
        ball.castShadow = true;
        scene.add(ball);

        // Fizik Verileri
        const data = {
            p1: { pos: p1.position, vel: new THREE.Vector3(), isGrounded: true, dancing: false, danceTimer: 0 },
            p2: { pos: p2.position, vel: new THREE.Vector3(), isGrounded: true, dancing: false, danceTimer: 0 },
            bot: { pos: botKeeper.position, vel: new THREE.Vector3() },
            ball: { pos: ball.position, vel: new THREE.Vector3() }
        };

        function resetBall() {
            data.ball.pos.set(0, 5, 0);
            data.ball.vel.set(0, 0, 0);
        }
        resetBall();

        // --- KONTROLLER (Giriş Dinleyicileri) ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // Mod Değiştirme
            if (e.code === 'Digit2' || e.code === 'Numpad2') {
                isTwoPlayer = true;
                p2.visible = true;
                document.getElementById('mode-text').innerText = "2 Oyuncu Modu (Ateş ve Su Tarzı Aktif)";
            }
            
            // Dans Tetikleyicileri
            if (e.code === 'KeyG') { data.p1.dancing = !data.p1.dancing; }
            if (e.code === 'KeyL' && isTwoPlayer) { data.p2.dancing = !data.p2.dancing; }
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Roblox Tarzı Kamera Çevirme (Sol Tık Basılı Tutarak)
        window.addEventListener('mousedown', (e) => {
            if(e.button === 0) { // Sol Tık
                isMouseDown = true;
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            const deltaX = e.clientX - mouseX;
            const deltaY = e.clientY - mouseY;
            mouseX = e.clientX;
            mouseY = e.clientY;

            cameraAngleX -= deltaX * 0.005;
            cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, cameraAngleY + deltaY * 0.005));
        });

        window.addEventListener('mouseup', (e) => { if(e.button === 0) isMouseDown = false; });
        
        // Sağ tık menüsünü engelle (Sağ tık şut için rahat olsun diye)
        window.addEventListener('contextmenu', e => e.preventDefault());

        // Şut Mekaniği (Mesafe Kontrollü)
        window.addEventListener('mousedown', (e) => {
            // P1 Şut (Sağ Tık)
            if (e.button === 2) {
                kickBall(data.p1, 1.2);
            }
            // P2 Şut (Alternatif olarak sol tık eğer 2 oyuncu moduysa ve p1 yönü değilse)
            if (e.button === 0 && isTwoPlayer && !isMouseDown) {
                kickBall(data.p2, 1.2);
            }
        });

        function kickBall(playerData, force) {
            let dist = playerData.pos.distanceTo(data.ball.pos);
            if (dist < 3) {
                // Karakterin baktığı yöne ya da topa doğru itiş yönü
                let dir = new THREE.Vector3().subVectors(data.ball.pos, playerData.pos).normalize();
                dir.y = 0.3; // Topu biraz havalandır
                data.ball.vel.copy(dir.multiplyScalar(force * 12));
            }
        }

        // --- OYUN DÖNGÜSÜ (FİZİK & MANTIK) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            // --- 1. OYUNCU HAREKET (WASD) ---
            if (!data.p1.dancing) {
                let moveX = 0;
                let moveZ = 0;
                if (keys['KeyW']) moveZ -= 1;
                if (keys['KeyS']) moveZ += 1;
                if (keys['KeyA']) moveX -= 1;
                if (keys['KeyD']) moveX += 1;

                if (moveX !== 0 || moveZ !== 0) {
                    let moveDir = new THREE.Vector3(moveX, 0, moveZ).normalize();
                    data.p1.pos.add(moveDir.multiplyScalar(8 * dt));
                    p1.rotation.y = Math.atan2(-moveX, -moveZ);
                }

                if (keys['Space'] && data.p1.isGrounded) {
                    data.p1.vel.y = 10;
                    data.p1.isGrounded = false;
                }
            }

            // --- 2. OYUNCU HAREKET (Ok Tuşları - Ateş ve Su gibi) ---
            if (isTwoPlayer && !data.p2.dancing) {
                let moveX2 = 0;
                let moveZ2 = 0;
                if (keys['ArrowUp']) moveZ2 -= 1;
                if (keys['ArrowDown']) moveZ2 += 1;
                if (keys['ArrowLeft']) moveX2 -= 1;
                if (keys['ArrowRight']) moveX2 += 1;

                if (moveX2 !== 0 || moveZ2 !== 0) {
                    let moveDir2 = new THREE.Vector3(moveX2, 0, moveZ2).normalize();
                    data.p2.pos.add(moveDir2.multiplyScalar(8 * dt));
                    p2.rotation.y = Math.atan2(-moveX2, -moveZ2);
                }

                if (keys['Enter'] && data.p2.isGrounded) {
                    data.p2.vel.y = 10;
                    data.p2.isGrounded = false;
                }
            }

            // P2 için klavyeden ekstra şut tuşu (Ctrl)
            if (isTwoPlayer && keys['ControlLeft']) {
                kickBall(data.p2, 1.2);
            }

            // --- DANS MEKANİĞİ (G ve L Tuşları) ---
            if (data.p1.dancing) {
                data.p1.danceTimer += dt * 5;
                p1.position.y = Math.abs(Math.sin(data.p1.danceTimer)) * 1.5;
                p1.rotation.y += 0.1;
            }
            if (data.p2.dancing && isTwoPlayer) {
                data.p2.danceTimer += dt * 5;
                p2.position.y = Math.abs(Math.sin(data.p2.danceTimer)) * 1.5;
                p2.rotation.y += 0.1;
            }

            // --- BOT KALECİ YAPAY ZEKASI ---
            // Top kendi yarı sahasına yaklaşınca topun X eksenini takip eder
            let targetX = data.ball.pos.x;
            targetX = Math.max(-5, Math.min(5, targetX)); // Kaleden çok uzaklaşmasın
            data.bot.pos.x += (targetX - data.bot.pos.x) * 4 * dt;
            
            // Eğer top kaleciye çok yaklaşırsa bot topu ileri fırlatır (kurtarış)
            if (data.bot.pos.distanceTo(data.ball.pos) < 2.5) {
                data.ball.vel.set((Math.random() - 0.5) * 5, 5, 15); // İleri ve yukarı fırlat
            }

            // --- YERÇEKİMİ VE FİZİK UYGULAMASI ---
            // P1 Yerçekimi
            if (!data.p1.isGrounded) {
                data.p1.vel.y -= 25 * dt;
                data.p1.pos.y += data.p1.vel.y * dt;
                if (data.p1.pos.y <= 0) {
                    data.p1.pos.y = 0;
                    data.p1.vel.y = 0;
                    data.p1.isGrounded = true;
                }
            } else if (!data.p1.dancing) { p1.position.y = 0; }

            // P2 Yerçekimi
            if (isTwoPlayer && !data.p2.isGrounded) {
                data.p2.vel.y -= 25 * dt;
                data.p2.pos.y += data.p2.vel.y * dt;
                if (data.p2.pos.y <= 0) {
                    data.p2.pos.y = 0;
                    data.p2.vel.y = 0;
                    data.p2.isGrounded = true;
                }
            } else if (!data.p2.dancing) { p2.position.y = 0; }

            // Top Fiziği (Sürtünme ve Yerçekimi)
            data.ball.vel.y -= 15 * dt; // Top yerçekimi
            data.ball.pos.addScaledVector(data.ball.vel, dt);

            // Topun zeminle olan teması ve sekmesi
            if (data.ball.pos.y < 0.6) {
                data.ball.pos.y = 0.6;
                data.ball.vel.y = -data.ball.vel.y * 0.6; // Sekme katsayısı
                // Zemin sürtünmesi
                data.ball.vel.x *= 0.98;
                data.ball.vel.z *= 0.98;
            }

            // Saha Sınırları Kontrolü & Gol Mantığı
            if (Math.abs(data.ball.pos.x) > 20 || Math.abs(data.ball.pos.z) > 30) {
                // Gol Kontrolü (Genişlik -6 ile 6 arası, Yükseklik 6'dan küçükse)
                if (data.ball.pos.z < -30 && Math.abs(data.ball.pos.x) < 6 && data.ball.pos.y < 6) {
                    score.blue++;
                    updateUI();
                    resetBall();
                } else if (data.ball.pos.z > 30 && Math.abs(data.ball.pos.x) < 6 && data.ball.pos.y < 6) {
                    score.red++;
                    updateUI();
                    resetBall();
                } else {
                    // Dışarı çıktıysa taç/korner gibi orta sahaya sıfırla
                    resetBall();
                }
            }

            // --- ARKADAN KAMERA TAKİBİ (ROBLOX TARZI KONTROL İLE) ---
            // Kamera odak noktası olarak P1'i seçiyoruz
            let targetPlayer = data.p1.pos;
            
            // Küresel koordinatlarla kamera açısını hesaplama
            camera.position.x = targetPlayer.x + cameraRadius * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.z = targetPlayer.z + cameraRadius * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.y = targetPlayer.y + cameraRadius * Math.sin(cameraAngleY) + 2;
            
            camera.lookAt(targetPlayer.x, targetPlayer.y + 1.5, targetPlayer.z);

            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('ui').innerHTML = `Mavi: ${score.blue} | Kırmızı: ${score.red}<br><span id="mode-text" style="font-size: 14px;">${isTwoPlayer ? '2 Oyuncu Modu Aktif' : "1 Oyuncu Modu (Aktif etmek için '2'ye bas)"}</span>`;
        }

        // Pencere Boyutu Değişirse Uyarla
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Oyunu Başlat
        animate();
    </script>
</body>
</html>
