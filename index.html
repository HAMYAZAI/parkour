<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hamyazparkour - ROBOT MAHMUT UZUN SÜRÜM</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; background-color: #000; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; z-index: 10; max-width: 300px; pointer-events: none; }
        #stats { position: absolute; top: 10px; right: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; pointer-events: none; text-align: right; z-index: 10; }
        h3 { margin: 0 0 5px 0; color: #55ff55; text-shadow: 1px 1px #000; font-size: 16px; }
        p { margin: 3px 0; font-size: 12px; }
        .stat-val { color: #ffcc00; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #power-bar { width: 100%; background: #333; height: 6px; margin-top: 5px; border-radius: 3px; overflow: hidden; display: none; }
        #power-fill { width: 100%; background: #55ff55; height: 100%; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="ui">
        <h3>HAMYAZPARKOUR v12</h3>
        <p><b>KONTROLLER:</b></p>
        <p>• Ekrana Tıkla -> Fareyle Bak</p>
        <p>• Hareket: W, A, S, D | Depar: SHIFT</p>
        <p><b>DANS MODLARI:</b></p>
        <p>• G: Robot Dansı | H: Kafa Sallama | J: Matrix</p>
        <div id="power-bar"><div id="power-fill"></div></div>
    </div>

    <div id="stats">
        <h3>ROBOT İSTATİSTİK</h3>
        <p>DÜŞME SAYISI: <span id="deaths" class="stat-val">0</span></p>
        <p>CHECKPOINT: <span id="cp-stat" class="stat-val">Yok</span></p>
    </div>

    <script>
        // --- 1. SES SENTEZLEYİCİ (ROBOTİK SESLER) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f1, f2, type, d) {
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = type;
                osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
                if(f2) osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + d);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + d);
                osc.start(); osc.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        // --- 2. SAHNE VE IŞIKLAR ---
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a1a2e);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x00ffff, 0.8); dirLight.position.set(40, 80, 30); scene.add(dirLight);

        // --- 3. DOKULAR VE ROBOT YÜZÜ ---
        function createPixelTexture(base, noise, shadow) {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = base; ctx.fillRect(0, 0, 64, 64);
            for (let x = 0; x < 64; x++) {
                for (let y = 0; y < 64; y++) {
                    if (Math.random() > 0.85) { ctx.fillStyle = noise; ctx.fillRect(x, y, 1, 1); }
                    else if (Math.random() < 0.15) { ctx.fillStyle = shadow; ctx.fillRect(x, y, 1, 1); }
                }
            }
            const t = new THREE.CanvasTexture(canvas); t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
            return t;
        }

        // Robot Yüz Dokusu Oluşturucu
        function createRobotFace() {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#4e54c8'; ctx.fillRect(0, 0, 64, 64); // Metalik Kafa
            ctx.fillStyle = '#00ffff'; ctx.fillRect(16, 20, 10, 10); ctx.fillRect(38, 20, 10, 10); // Parlayan Robot Gözleri
            ctx.fillStyle = '#00ff55'; ctx.fillRect(20, 42, 24, 4); // Dijital Ağız Hattı
            const t = new THREE.CanvasTexture(canvas); t.magFilter = THREE.NearestFilter; return t;
        }

        const metalTex = createPixelTexture('#4e54c8', '#5f64df', '#373b99');
        const jointTex = createPixelTexture('#1f2147', '#2a2d5c', '#151630');
        const cpTex    = createPixelTexture('#e67e22', '#f39c12', '#d35400');
        const lavaTex  = createPixelTexture('#ff3333', '#ff6633', '#990000');
        const diamondTex = createPixelTexture('#00ffcc', '#33ffdd', '#00aa88');
        const faceTex  = createRobotFace();

        // --- 4. BAYAĞI UZATILMIŞ MEGA HARİTA ---
        const blocks = [];
        function createBlock(x, y, z, w, h, d, tex, isCP=false, isFinish=false) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ map: tex }));
            mesh.position.set(x, y, z); scene.add(mesh);
            const b = { mesh: mesh, minX: x-w/2, maxX: x+w/2, topY: y+h/2, minZ: z-d/2, maxZ: z+d/2, isCP: isCP, isFinish: isFinish, spawn: {x:x, y:y+h/2, z:z}, isMoving: false, startX: x };
            blocks.push(b); return b;
        }

        // Geniş Başlangıç Lobisi
        createBlock(0, -1, 15, 30, 2, 30, metalTex); 

        // Havada Dönüp Duran Robotik Güç Çekirdeği (Eski Ayakkabı Yerine)
        const bootItem = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        bootItem.position.set(0, 1.5, 15); scene.add(bootItem);

        // --- UZATILMIŞ ETAPLAR ---
        // Etap 1: Temel Atlamalar
        createBlock(0, 0, -2, 4, 2, 4, metalTex);
        createBlock(0, 1, -9, 2.5, 2, 2.5, metalTex);
        createBlock(3, 2, -15, 2.5, 2, 2.5, metalTex);
        createBlock(0, 3, -22, 4, 2, 4, cpTex, true); // CP 1

        // Etap 2: Mekanik Kayan Platform ve Dar Bloklar
        const movingBlock1 = createBlock(-3, 4, -29, 2.5, 1, 2.5, metalTex); movingBlock1.isMoving = true; movingBlock1.speed = 2; movingBlock1.range = 2.5;
        createBlock(2, 5, -36, 2, 2, 2, metalTex);
        createBlock(-2, 6, -42, 1.8, 2, 1.8, metalTex);
        createBlock(0, 7, -49, 4, 2, 4, cpTex, true); // CP 2

        // Etap 3: Uzatılmış Yüksek İrtifa Direkleri (Yeni Eklenen Bölümler)
        createBlock(4, 8.5, -56, 1.5, 3, 1.5, metalTex);
        createBlock(0, 10, -63, 1.5, 3, 1.5, metalTex);
        createBlock(-4, 11.5, -70, 1.5, 3, 1.5, metalTex);
        const movingBlock2 = createBlock(0, 12.5, -77, 3, 1, 3, metalTex); movingBlock2.isMoving = true; movingBlock2.speed = 3.5; movingBlock2.range = 4;
        createBlock(0, 13.5, -85, 4, 2, 4, cpTex, true); // CP 3 (Yeni Uzak Checkpoint)

        // Etap 4: Merdiven Tipi İnce Sütunlar ve Bitiş Koşusu
        createBlock(3, 15, -92, 1.2, 2, 1.2, metalTex);
        createBlock(-3, 16.5, -99, 1.2, Merdiven=2, 1.2, metalTex);
        createBlock(0, 18, -107, 1.5, 2, 1.5, metalTex);
        createBlock(0, 19, -116, 2, 2, 2, metalTex);
        
        // Devasa Bitiş Elmas Platformu
        createBlock(0, 20, -128, 6, 2, 6, diamondTex, false, true);

        // Sonsuz Lav Denizi
        createBlock(0, -25, -50, 2000, 1, 2000, lavaTex);

        // --- 5. ROBOT MAHMUT MODELİ (YÜZ, İSİM VE METALİK BOTLAR DAHİL) ---
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshLambertMaterial({ map: metalTex })); body.position.y = 1.0; playerGroup.add(body);
        
        // Robot Kafası ve Özel Pikselli Yüzü
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), [
            new THREE.MeshLambertMaterial({map:metalTex}), new THREE.MeshLambertMaterial({map:metalTex}),
            new THREE.MeshLambertMaterial({map:metalTex}), new THREE.MeshLambertMaterial({map:metalTex}),
            new THREE.MeshLambertMaterial({map:faceTex}),  new THREE.MeshLambertMaterial({map:metalTex}) // Sadece ön yüz
        ]);
        head.position.y = 1.9; playerGroup.add(head);

        // Üstünde "MAHMUT" Yazan Metin Etiketi (Geri Geldi!)
        const nameCanvas = document.createElement('canvas'); nameCanvas.width = 256; nameCanvas.height = 64;
        const nameCtx = nameCanvas.getContext('2d');
        nameCtx.fillStyle = 'rgba(0,0,0,0.7)'; nameCtx.fillRect(10, 10, 236, 44);
        nameCtx.font = 'bold 24px monospace'; nameCtx.fillStyle = '#00ffff'; nameCtx.textAlign = 'center'; nameCtx.textBaseline = 'middle';
        nameCtx.fillText("MAHMUT", 128, 32);
        const nameSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(nameCanvas), transparent: true }));
        nameSprite.position.y = 2.6; nameSprite.scale.set(2, 0.5, 1); playerGroup.add(nameSprite);

        // Kollar ve Robotik Eklem Detayları
        const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshLambertMaterial({ map: jointTex })); lArm.position.set(-0.55, 1.0, 0); playerGroup.add(lArm);
        const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshLambertMaterial({ map: jointTex })); rArm.position.set(0.55, 1.0, 0); playerGroup.add(rArm);
        const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshLambertMaterial({ map: jointTex })); lLeg.position.set(-0.22, 0.4, 0); playerGroup.add(lLeg);
        const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshLambertMaterial({ map: jointTex })); rLeg.position.set(0.22, 0.4, 0); playerGroup.add(rLeg);

        // Robotun Çelik Ağır Botları (Ayak Altındaki Ağır Bloklar)
        const lBot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.4), new THREE.MeshLambertMaterial({ map: metalTex })); lBot.position.set(0, -0.45, 0.05); lLeg.add(lBot);
        const rBot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.4), new THREE.MeshLambertMaterial({ map: metalTex })); rBot.position.set(0, -0.45, 0.05); rLeg.add(rBot);

        playerGroup.position.set(0, 0, 20); scene.add(playerGroup);

        // --- 6. FİZİK PARAMETRELERİ ---
        let velY = 0, grounded = true, deaths = 0;
        let respawnPoint = { x: 0, y: 0, z: 20 };
        let jumpPower = 0.16; let powerUpTimer = 0;
        let danceMode = 0, danceTimer = 0; // 0:Yok, 1:Robot, 2:Headbang, 3:Matrix

        const keys = {};
        window.addEventListener('keydown', e => { if(audioCtx.state==='suspended') audioCtx.resume(); keys[e.code] = true; });
        window.addEventListener('keyup', e => keys[e.code] = false);
        document.body.addEventListener('click', () => { document.body.pointerLockElement || document.body.requestPointerLock(); });

        let camRotX = 0.2, camRotY = 0;
        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                camRotY -= e.movementX * 0.003; camRotX += e.movementY * 0.003;
                camRotX = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotX));
            }
        });

        // --- 7. OYUN DÖNGÜSÜ (DANS VE HAREKET HESAPLARI) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const timeElapsed = clock.getElapsedTime();

            // Çekirdek İtem Döndürme
            bootItem.rotation.x += delta * 2; bootItem.rotation.y += delta * 1.5;
            bootItem.position.y = 1.5 + Math.sin(timeElapsed * 4) * 0.1;

            // Kayan Platform Mekanizmaları
            for(let b of blocks) {
                if(b.isMoving) {
                    let offset = Math.sin(timeElapsed * b.speed) * b.range;
                    b.mesh.position.x = b.startX + offset;
                    b.minX = b.mesh.position.x - (b.mesh.geometry.parameters.width/2);
                    b.maxX = b.mesh.position.x + (b.mesh.geometry.parameters.width/2);
                }
            }

            // Hareket Kontrolü
            let currentSpeed = keys['ShiftLeft'] ? 0.15 : 0.085;
            let mx = 0, mz = 0;

            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotY).normalize();
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotY).normalize();

            if (keys['KeyW']) { mx += forward.x * currentSpeed; mz += forward.z * currentSpeed; }
            if (keys['KeyS']) { mx -= forward.x * currentSpeed; mz -= forward.z * currentSpeed; }
            if (keys['KeyA']) { mx -= right.x * currentSpeed; mz -= right.z * currentSpeed; }
            if (keys['KeyD']) { mx += right.x * currentSpeed; mz += right.z * currentSpeed; }

            // Herhangi bir aksiyon dans modunu sıfırlar
            if (mx !== 0 || mz !== 0 || keys['Space']) {
                danceMode = 0; body.position.y = 1.0; head.position.set(0, 1.9, 0); head.rotation.set(0,0,0);
                lArm.position.set(-0.55, 1.0, 0); rArm.position.set(0.55, 1.0, 0);
                lArm.rotation.set(0,0,0); rArm.rotation.set(0,0,0); playerGroup.rotation.z = 0;
            }

            // Dans Değiştiriciler
            if (keys['KeyG'] && grounded) danceMode = 1;
            if (keys['KeyH'] && grounded) danceMode = 2;
            if (keys['KeyJ'] && grounded) danceMode = 3;

            // Uzuv Sallama ve 3 Yeni Robot Dansı Animasyonları
            if (danceMode === 0) {
                if ((mx !== 0 || mz !== 0) && grounded) {
                    let freq = keys['ShiftLeft'] ? 18 : 11;
                    let wave = Math.sin(timeElapsed * freq) * 0.6;
                    lLeg.rotation.x = wave; rLeg.rotation.x = -wave;
                    lArm.rotation.x = -wave; rArm.rotation.x = wave;
                } else if (!grounded) {
                    lLeg.rotation.x = -0.3; rLeg.rotation.x = 0.3; lArm.rotation.x = 0.5; rArm.rotation.x = -0.5;
                } else {
                    lLeg.rotation.x = rLeg.rotation.x = lArm.rotation.x = rArm.rotation.x = 0;
                }
            } else {
                danceTimer += delta * 15;
                if (danceMode === 1) { // 1. Robotik Adımlama Dansı
                    let step = Math.floor(danceTimer) % 4;
                    body.position.y = 1.0 + (step % 2 * 0.1);
                    lArm.rotation.x = step === 1 ? -Math.PI/2 : 0;
                    rArm.rotation.x = step === 3 ? -Math.PI/2 : 0;
                } else if (danceMode === 2) { // 2. Devre Yakan Kafa Sallama
                    head.rotation.x = Math.sin(danceTimer * 1.5) * 0.5;
                    lArm.rotation.z = Math.sin(danceTimer) * 0.8;
                    rArm.rotation.z = -Math.sin(danceTimer) * 0.8;
                } else if (danceMode === 3) { // 3. Çılgın Matrix Taklası
                    playerGroup.rotation.z = Math.sin(danceTimer * 0.5) * Math.PI;
                    lArm.position.y = 1.3; rArm.position.y = 1.3;
                }
            }

            playerGroup.position.x += mx; playerGroup.position.z += mz;
            if (mx !== 0 || mz !== 0) playerGroup.rotation.y = Math.atan2(mx, mz);

            // Fizik ve Düşüş Hesapları
            velY -= 0.007; playerGroup.position.y += velY;
            let hit = false;

            for (let b of blocks) {
                const px = playerGroup.position.x; const py = playerGroup.position.y; const pz = playerGroup.position.z;
                if (px >= b.minX - 0.4 && px <= b.maxX + 0.4 && pz >= b.minZ - 0.4 && pz <= b.maxZ + 0.4) {
                    if (py <= b.topY && py >= b.topY - 0.4 && velY <= 0) {
                        playerGroup.position.y = b.topY; velY = 0; grounded = true; hit = true;
                        
                        if(b.isMoving) playerGroup.position.x += Math.sin(timeElapsed * b.speed) * 0.05;

                        if (b.isCP && respawnPoint.z !== b.spawn.z) {
                            respawnPoint = { x: b.spawn.x, y: b.spawn.y, z: b.spawn.z };
                            document.getElementById('cp-stat').innerText = `X:${b.spawn.x} Z:${b.spawn.z}`;
                            playSound(300, 600, 'sine', 0.15);
                        }

                        if (b.isFinish) {
                            playSound(500, 1500, 'sine', 0.6);
                            alert("İNANILMAZ! ROBOT MAHMUT MEGA PARKURU FATHETTİ! 🏆 Robot Devreleri Başarıyla Tamamlandı.");
                            respawnPoint = { x: 0, y: 0, z: 20 }; playerGroup.position.set(0, 0, 20);
                            document.getElementById('cp-stat').innerText = "Yok";
                        }
                        break;
                    }
                }
            }
            if (!hit) grounded = false;

            if (keys['Space'] && grounded && danceMode === 0) {
                velY = jumpPower; grounded = false; playSound(200, 400, 'triangle', 0.12);
            }

            // Çekirdek İtem Algılama
            if (playerGroup.position.distanceTo(bootItem.position) < 1.2 && powerUpTimer <= 0) {
                jumpPower = 0.23; powerUpTimer = 6.0; playSound(400, 800, 'sine', 0.25);
                document.getElementById('power-bar').style.display = 'block';
            }

            if (powerUpTimer > 0) {
                powerUpTimer -= delta;
                document.getElementById('power-fill').style.width = (powerUpTimer / 6.0) * 100 + '%';
                if (powerUpTimer <= 0) { jumpPower = 0.16; document.getElementById('power-bar').style.display = 'none'; }
            }

            // Lava Çakılma Kontrolü
            if (playerGroup.position.y < -15) {
                deaths++; document.getElementById('deaths').innerText = deaths;
                playSound(150, 70, 'sawtooth', 0.3);
                playerGroup.position.set(respawnPoint.x, respawnPoint.y, respawnPoint.z);
                velY = 0; grounded = true;
            }

            // Kamera İzleme Mekanizması
            const cx = playerGroup.position.x - Math.sin(camRotY) * Math.cos(camRotX) * 7;
            const cy = playerGroup.position.y + 2.0 + Math.sin(camRotX) * 7;
            const cz = playerGroup.position.z - Math.cos(camRotY) * Math.cos(camRotX) * 7;
            camera.position.set(cx, cy, cz); camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.0, playerGroup.position.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
