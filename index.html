<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hamyazparkour - GERÇEK MULTIPLAYER & TÜM ÖZELLİKLER</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; background-color: #000; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; z-index: 10; max-width: 320px; }
        #multiplayer-panel { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #555; pointer-events: auto; }
        #stats { position: absolute; top: 10px; right: 10px; color: #fff; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 5px; border: 2px solid #555; pointer-events: none; text-align: right; z-index: 10; }
        h3 { margin: 0 0 5px 0; color: #55ff55; text-shadow: 1px 1px #000; font-size: 16px; }
        p { margin: 3px 0; font-size: 12px; }
        input, button { font-family: monospace; font-size: 12px; padding: 4px; margin-top: 4px; }
        button { background: #55ff55; color: #000; border: none; cursor: pointer; font-weight: bold; }
        .stat-val { color: #ffcc00; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="ui">
        <h3>HAMYAZPARKOUR v11 [HER ŞEY DAHİL]</h3>
        <p><b>PC:</b> Tıkla -> Fareyle Bak | W,A,S,D</p>
        <p><b>DEPAR:</b> SHIFT | <b>DANS:</b> G</p>
        
        <div id="multiplayer-panel">
            <p>🔴 <b>Oda Kodun:</b> <span id="my-id" style="color:#ffcc00; font-weight:bold;">Yükleniyor...</span></p>
            <p>🔵 <b>Kuzeninin Kodu:</b></p>
            <input type="text" id="peer-id-input" placeholder="Kod buraya...">
            <button id="connect-btn">Odaya Bağlan</button>
            <p id="connection-status" style="color:#ff5555; margin-top:5px;">Durum: Çevrimdışı</p>
        </div>
    </div>

    <div id="stats">
        <h3>SKORBORD</h3>
        <p>MAHMUT 1 (SEN): <span id="p1-deaths" class="stat-val">0</span> düşme</p>
        <p style="color:#ff4444;">MAHMUT 2 (KUZEN): <span id="p2-deaths" class="stat-val" style="color:#ff4444;">0</span></p>
    </div>

    <script>
        // --- 1. SES SENTEZLEYİCİ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f1, f2, type, d) {
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = type;
                osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
                if(f2) osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + d);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + d);
                osc.start(); osc.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        // --- 2. SAHNE VE IŞIKLAR ---
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0xaaccff);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.75); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5ea, 0.7); dirLight.position.set(40, 80, 30); scene.add(dirLight);

        // --- 3. DOKULAR ---
        function createPixelTexture(base, noise, shadow) {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = base; ctx.fillRect(0, 0, 64, 64);
            for (let x = 0; x < 64; x++) {
                for (let y = 0; y < 64; y++) {
                    const r = Math.random();
                    if (r > 0.88) { ctx.fillStyle = noise; ctx.fillRect(x, y, 1, 1); }
                    else if (r < 0.12) { ctx.fillStyle = shadow; ctx.fillRect(x, y, 1, 1); }
                }
            }
            const t = new THREE.CanvasTexture(canvas); t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
            return t;
        }

        const grassTex = createPixelTexture('#3b8f21', '#4ca634', '#2d6d19');
        const stoneTex = createPixelTexture('#6b6b6b', '#828282', '#525252');
        const cpTex    = createPixelTexture('#e67e22', '#f39c12', '#d35400');
        const lavaTex  = createPixelTexture('#e74c3c', '#e67e22', '#c0392b');
        const diamondTex = createPixelTexture('#1abc9c', '#2ecc71', '#16a085');
        const skinTex  = createPixelTexture('#f3c19f', '#faebd7', '#e0aa85');
        const cloth1   = createPixelTexture('#2980b9', '#3498db', '#1f6391'); 
        const cloth2   = createPixelTexture('#c0392b', '#e74c3c', '#962d22'); 
        const pantsTex = createPixelTexture('#2c3e50', '#34495e', '#1a252f');

        // --- 4. HARİTA (GERİ GELDİ!) ---
        const blocks = [];
        function createBlock(x, y, z, w, h, d, tex, isCP=false, isFinish=false) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ map: tex }));
            mesh.position.set(x, y, z); scene.add(mesh);
            const b = { mesh: mesh, minX: x-w/2, maxX: x+w/2, topY: y+h/2, minZ: z-d/2, maxZ: z+d/2, isCP: isCP, isFinish: isFinish, spawn: {x:x, y:y+h/2, z:z}, isMoving: false, startX: x };
            blocks.push(b); return b;
        }

        // Büyük Çimenlik Lobi Alanı
        createBlock(0, -1, 15, 30, 2, 30, grassTex); 

        // Süper Ayakkabı İtemi
        const bootItem = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true }));
        bootItem.position.set(0, 1, 15); scene.add(bootItem);

        // Parkurlar
        createBlock(0, 0, -2, 4, 2, 4, stoneTex);
        createBlock(0, 1, -9, 2.5, 2, 2.5, stoneTex);
        createBlock(3, 2, -15, 2.5, 2, 2.5, stoneTex);
        createBlock(0, 3, -22, 4, 2, 4, cpTex, true); 

        // Hareketli Blok
        const movingBlock = createBlock(-3, 4, -29, 2.5, 1, 2.5, stoneTex);
        movingBlock.isMoving = true;

        createBlock(2, 5, -36, 2.5, 2, 2.5, stoneTex);
        createBlock(2, 6.5, -43, 4, 2, 4, cpTex, true); 
        createBlock(-2, 7.5, -50, 2.5, 2, 2.5, stoneTex);
        createBlock(1, 8.5, -57, 2.5, 2, 2.5, stoneTex);
        createBlock(0, 9.5, -66, 6, 2, 6, diamondTex, false, true); // Bitiş
        createBlock(0, -25, -20, 1200, 1, 1200, lavaTex); // Lav

        // --- 5. KARAKTER FABRİKASI (KOLLAR VE BAŞLIKLAR DAHİL) ---
        function createCharacter(name, shirtTex) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshLambertMaterial({ map: shirtTex })); body.position.y = 1.0; group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshLambertMaterial({map:skinTex})); head.position.y = 1.9; group.add(head);

            const can = document.createElement('canvas'); can.width=256; can.height=64; const ctx=can.getContext('2d');
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(28,12,200,40); ctx.font='bold 20px monospace'; ctx.fillStyle='#fff';
            ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(name, 128, 32);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(can), transparent:true}));
            sprite.position.y = 2.6; sprite.scale.set(2.5, 0.6, 1); group.add(sprite);

            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:shirtTex})); lArm.position.set(-0.55,1,0); group.add(lArm);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:shirtTex})); rArm.position.set(0.55,1,0); group.add(rArm);
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:pantsTex})); lLeg.position.set(-0.22,0.4,0); group.add(lLeg);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.8,0.28), new THREE.MeshLambertMaterial({map:pantsTex})); rLeg.position.set(0.22,0.4,0); group.add(rLeg);

            scene.add(group);
            return { mesh: group, body: body, head: head, nameTag: sprite, lLeg:lLeg, rLeg:rLeg, lArm:lArm, rArm:rArm, velY:0, grounded:true, deaths:0, cp:{x:0,y:0,z:20}, jumpPower:0.16, powerTimer:0, isDancing:false, danceTimer:0 };
        }

        const p1 = createCharacter("Mahmut 1 (Sen)", cloth1); p1.mesh.position.set(0, 0, 20);
        const p2 = createCharacter("Mahmut 2 (Kuzen)", cloth2); p2.mesh.position.set(2, 0, 20);

        // --- 6. GİRDİLER VE KONTROLLER ---
        const keys = {};
        window.addEventListener('keydown', e => { if(audioCtx.state==='suspended') audioCtx.resume(); keys[e.code]=true; });
        window.addEventListener('keyup', e => keys[e.code]=false);
        document.body.addEventListener('click', (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') document.body.pointerLockElement || document.body.requestPointerLock(); });

        let camRotX = 0.2, camRotY = 0;
        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body) {
                camRotY -= e.movementX * 0.003; camRotX += e.movementY * 0.003;
                camRotX = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotX));
            }
        });

        // --- 7. PEERJS ONLINE ALTYAPISI ---
        const myRoomId = 'mahmut-' + Math.floor(1000 + Math.random() * 9000);
        const peer = new Peer(myRoomId); let connection = null;

        peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });
        peer.on('connection', (conn) => { connection = conn; setupNetworkEvents(); });
        document.getElementById('connect-btn').addEventListener('click', () => {
            const peerId = document.getElementById('peer-id-input').value.trim();
            if(peerId) { connection = peer.connect(peerId); setupNetworkEvents(); }
        });

        function setupNetworkEvents() {
            connection.on('open', () => {
                document.getElementById('connection-status').innerText = "Durum: BAĞLANDI!";
                document.getElementById('connection-status').style.color = "#55ff55";
            });
            connection.on('data', (data) => {
                if(data.type === 'move') {
                    p2.mesh.position.set(data.x, data.y, data.z);
                    p2.mesh.rotation.y = data.rotY;
                    p2.body.position.y = data.bY; p2.head.position.y = data.hY; p2.head.position.x = data.hX; p2.nameTag.position.y = data.ntY;
                    p2.lLeg.rotation.x = data.lLegX; p2.rLeg.rotation.x = data.rLegX;
                    p2.lArm.rotation.x = data.lArmX; p2.rArm.rotation.x = data.rArmX;
                    p2.lArm.rotation.z = data.lArmZ; p2.rArm.rotation.z = data.rArmZ;
                }
                if(data.type === 'death') {
                    p2.deaths = data.deaths; document.getElementById('p2-deaths').innerText = data.deaths;
                }
            });
        }

        function sendMyData() {
            if(connection && connection.open) {
                connection.send({
                    type: 'move', x: p1.mesh.position.x, y: p1.mesh.position.y, z: p1.mesh.position.z, rotY: p1.mesh.rotation.y,
                    bY: p1.body.position.y, hY: p1.head.position.y, hX: p1.head.position.x, ntY: p1.nameTag.position.y,
                    lLegX: p1.lLeg.rotation.x, rLegX: p1.rLeg.rotation.x,
                    lArmX: p1.lArm.rotation.x, rArmX: p1.rArm.rotation.x,
                    lArmZ: p1.lArm.rotation.z, rArmZ: p1.rArm.rotation.z
                });
            }
        }

        // --- 8. FİZİK VE ANİMASYON DÖNGÜSÜ ---
        const clock = new THREE.Clock();

        function updatePhysics(p, mx, mz, delta) {
            p.mesh.position.x += mx; p.mesh.position.z += mz;
            if(mx!==0 || mz!==0) p.mesh.rotation.y = Math.atan2(mx, mz);

            // Uzuv Sallama ve Dans Animasyonlarının Hesabı
            if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'] || keys['Space']) {
                p.isDancing = false; p.body.position.y = 1.0; p.head.position.set(0, 1.9, 0); p.nameTag.position.y = 2.6;
                p.lArm.rotation.z = p.rArm.rotation.z = 0;
            }

            if (!p.isDancing) {
                if((mx!==0 || mz!==0) && p.grounded) {
                    let speedFactor = keys['ShiftLeft'] ? 16 : 10;
                    let time = clock.getElapsedTime() * speedFactor;
                    p.lLeg.rotation.x = Math.sin(time)*0.6; p.rLeg.rotation.x = -Math.sin(time)*0.6;
                    p.lArm.rotation.x = -Math.sin(time)*0.6; p.rArm.rotation.x = Math.sin(time)*0.6;
                } else if(!p.grounded) {
                    p.lLeg.rotation.x = -0.2; p.rLeg.rotation.x = 0.2; p.lArm.rotation.x = 0.4; p.rArm.rotation.x = -0.4;
                } else {
                    p.lLeg.rotation.x = p.rLeg.rotation.x = p.lArm.rotation.x = p.rArm.rotation.x = 0;
                }
            } else {
                p.danceTimer += delta * 20;
                const offset = Math.sin(p.danceTimer) * 0.15;
                p.body.position.y = 1.0 + offset; p.head.position.y = 1.9 + offset; p.head.position.x = Math.cos(p.danceTimer) * 0.2;
                p.nameTag.position.y = 2.6 + offset;
                p.lArm.rotation.z = Math.sin(p.danceTimer) * 1.2; p.rArm.rotation.z = -Math.sin(p.danceTimer) * 1.2;
                p.lLeg.rotation.x = Math.cos(p.danceTimer) * 0.5; p.rLeg.rotation.x = -Math.cos(p.danceTimer) * 0.5;
            }

            if (keys['KeyG'] && p.grounded) p.isDancing = true;

            // Yerçekimi
            p.velY -= 0.007; p.mesh.position.y += p.velY;
            let hit = false;

            for(let b of blocks) {
                const bx = p.mesh.position.x; const by = p.mesh.position.y; const bz = p.mesh.position.z;
                if(bx >= b.minX-0.4 && bx <= b.maxX+0.4 && bz >= b.minZ-0.4 && bz <= b.maxZ+0.4) {
                    if(by <= b.topY && by >= b.topY-0.4 && p.velY <= 0) {
                        p.mesh.position.y = b.topY; p.velY = 0; p.grounded = true; hit = true;
                        if(b.isMoving) p.mesh.position.x += Math.sin(clock.getElapsedTime()*2)*0.05;
                        if(b.isCP && p.cp.z !== b.spawn.z) p.cp = {x: b.spawn.x, y: b.spawn.y, z: b.spawn.z};
                        break;
                    }
                }
            }
            if(!hit) p.grounded = false;

            // Süper Ayakkabı Süresi Azalması
            if(p.powerTimer > 0) {
                p.powerTimer -= delta;
                if(p.powerTimer <= 0) p.jumpPower = 0.16;
            }

            // Düştüğünde Yeniden Canlanma
            if(p.mesh.position.y < -15) {
                p.deaths++; document.getElementById('p1-deaths').innerText = p.deaths;
                playSound(100, 50, 'sawtooth', 0.2);
                p.mesh.position.set(p.cp.x, p.cp.y, p.cp.z); p.velY = 0; p.grounded = true;
                if(connection && connection.open) connection.send({ type: 'death', deaths: p.deaths });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            bootItem.rotation.y += delta * 2;
            bootItem.position.y = 1 + Math.sin(clock.getElapsedTime() * 3) * 0.15;

            // Platformu Hareket Ettir
            for(let b of blocks) {
                if(b.isMoving) {
                    let offset = Math.sin(clock.getElapsedTime() * 2) * 2;
                    b.mesh.position.x = b.startX + offset;
                    b.minX = b.mesh.position.x - 1.25; b.maxX = b.mesh.position.x + 1.25;
                }
            }

            // Karakter Hareketi (Yönler Kameraya Göre Tam Doğru)
            let speed = keys['ShiftLeft'] ? 0.14 : 0.08;
            let mx = 0, mz = 0;
            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotY).normalize();
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camRotY).normalize();

            if(keys['KeyW']) { mx += forward.x * speed; mz += forward.z * speed; }
            if(keys['KeyS']) { mx -= forward.x * speed; mz -= forward.z * speed; }
            if(keys['KeyA']) { mx -= right.x * speed; mz -= right.z * speed; }
            if(keys['KeyD']) { mx += right.x * speed; mz += right.z * speed; }

            if(keys['Space'] && p1.grounded && !p1.isDancing) { p1.velY = p1.jumpPower; p1.grounded = false; playSound(120, 280, 'triangle', 0.15); }

            // Süper Ayakkabı Kontrolü
            if(p1.mesh.position.distanceTo(bootItem.position) < 1.2 && p1.powerTimer <= 0) {
                p1.jumpPower = 0.24; p1.powerTimer = 5.0; playSound(300, 600, 'sine', 0.3);
            }

            updatePhysics(p1, mx, mz, delta);
            sendMyData();

            // Kamera Takibi
            const tx = p1.mesh.position.x - Math.sin(camRotY)*Math.cos(camRotX)*7;
            const ty = p1.mesh.position.y + 2.0 + Math.sin(camRotX)*7;
            const tz = p1.mesh.position.z - Math.cos(camRotY)*Math.cos(camRotX)*7;
            camera.position.set(tx, ty, tz);
            camera.lookAt(p1.mesh.position.x, p1.mesh.position.y + 1.0, p1.mesh.position.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
