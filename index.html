<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Futbol Pro v2</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none;}
        #canvas-container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 10px 30px;
            border: 4px solid #fff;
        }
        #controls-info {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 13px;
            pointer-events: none;
            border: 2px solid #555;
            line-height: 1.5;
        }
    </style>
    <!-- Three.js Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">MAVİ: 0 | KIRMIZI: 0<br><span id="mode-text" style="font-size: 16px; color: #ffeb3b;">1 Oyuncu Modu ('2' tuşu ile 2 Kişilik yap)</span></div>
    <div id="controls-info">
        <b>[KONTROLLER]</b><br>
        <b>P1 (Mavi):</b> WASD + Boşluk (Zıpla) + Sağ Tık (Şut) + G (Dans)<br>
        <b>P2 (Kırmızı):</b> Yön Tuşları + Enter (Zıpla) + Sol Tık VEYA Ctrl (Şut) + L (Dans)<br>
        <b>Kamera:</b> Sol Tıka basılı tutarak fareyi çevir (Roblox stili).
    </div>
    <div id="canvas-container"></div>

    <script>
        // --- SAHNE VE AYARLAR ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5c94fc); // Minecraft gökyüzü mavisi
        scene.fog = new THREE.FogExp2(0x5c94fc, 0.015);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
        sunLight.position.set(30, 60, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 150;
        const d = 40;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        scene.add(sunLight);

        // --- TEKS-TÜR PACK YAPICI (Procedural Textures) ---
        // Harici görsellere bağımlı olmamak için kodla Steve tarzı yüz ve kıyafet dokuları üretiyoruz
        function createCharacterTexture(mainColorHex, isFace) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            // Arka plan rengi (Kıyafet veya Ten rengi)
            ctx.fillStyle = mainColorHex;
            ctx.fillRect(0, 0, 64, 64);
            
            // Minecraft gürültü (noise) efekti verelim
            for (let i = 0; i < 64; i += 4) {
                for (let j = 0; j < 64; j += 4) {
                    if (Math.random() > 0.6) {
                        ctx.fillStyle = 'rgba(0,0,0,0.08)';
                        ctx.fillRect(i, j, 4, 4);
                    }
                }
            }

            // Eğer kafa yüzü ise göz ve ağız çiz
            if (isFace) {
                ctx.fillStyle = '#ffdbac'; // Ten Rengi Ön Yüz
                ctx.fillRect(16, 16, 32, 48);
                // Gözler
                ctx.fillStyle = '#fff';
                ctx.fillRect(20, 28, 8, 8);
                ctx.fillRect(36, 28, 8, 8);
                ctx.fillStyle = '#4caf50'; // Göz bebeği
                ctx.fillRect(24, 28, 4, 8);
                ctx.fillRect(36, 28, 4, 8);
                // Ağız/Sakal
                ctx.fillStyle = '#5c4033';
                ctx.fillRect(24, 44, 16, 4);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // Piksel görünümü sağlamak için kritik!
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        // Dokuları Hazırla
        const blueShirtTex = createCharacterTexture('#2196f3', false);
        const redShirtTex = createCharacterTexture('#f44336', false);
        const skinTex = createCharacterTexture('#ffdbac', false);
        const faceTex = createCharacterTexture('#ffdbac', true);
        const ballTex = createCharacterTexture('#ffffff', false); // Top için beyaz gürültülü doku

        // Materyaller
        const p1Mat = new THREE.MeshLambertMaterial({ map: blueShirtTex });
        const p2Mat = new THREE.MeshLambertMaterial({ map: redShirtTex });
        const skinMat = new THREE.MeshLambertMaterial({ map: skinTex });
        const faceMaterial = new THREE.MeshLambertMaterial({ map: faceTex });
        
        // Kafanın sadece ön yüzünde surat olması için materyal dizisi
        function getHeadMaterials(shirtMat) {
            return [shirtMat, shirtMat, shirtMat, shirtMat, faceMaterial, shirtMat];
        }

        // --- STADYUM VE SAHA ---
        const greenMat = new THREE.MeshLambertMaterial({ color: 0x3b7a24 });
        const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

        const fieldGeo = new THREE.BoxGeometry(50, 1, 70);
        const field = new THREE.Mesh(fieldGeo, greenMat);
        field.position.y = -0.5;
        field.receiveShadow = true;
        scene.add(field);

        // Tribünler (Minecraft Blok Tarzı)
        for (let i = 0; i < 3; i++) {
            const standGeo = new THREE.BoxGeometry(60, 2 + i * 2, 5);
            const standL = new THREE.Mesh(standGeo, new THREE.MeshLambertMaterial({color: 0x666666}));
            standL.position.set(0, (2 + i * 2)/2 - 0.5, -38 - i * 4);
            standL.castShadow = true; standL.receiveShadow = true;
            scene.add(standL);

            const standR = standL.clone();
            standR.position.z = 38 + i * 4;
            scene.add(standR);
        }

        // Kaleler
        function createGoal(zPos) {
            const goalGroup = new THREE.Group();
            const postGeo = new THREE.BoxGeometry(1, 7, 1);
            const barGeo = new THREE.BoxGeometry(16, 1, 1);
            
            const lp = new THREE.Mesh(postGeo, whiteMat); lp.position.set(-8, 3.5, 0); lp.castShadow = true;
            const rp = new THREE.Mesh(postGeo, whiteMat); rp.position.set(8, 3.5, 0); rp.castShadow = true;
            const topBar = new THREE.Mesh(barGeo, whiteMat); topBar.position.set(0, 7, 0); topBar.castShadow = true;

            goalGroup.add(lp, rp, topBar);
            goalGroup.position.set(0, 0, zPos);
            scene.add(goalGroup);
        }
        createGoal(-35); // Kuzey Kalesi
        createGoal(35);  // Güney Kalesi

        // --- KARAKTER FABRİKASI (Ekstremite Eklenmiş Model) ---
        function buildMinecraftCharacter(shirtMat) {
            const charGroup = new THREE.Group();

            // Gövde
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.4, 0.8), shirtMat);
            body.position.y = 2.2;
            body.castShadow = true;
            charGroup.add(body);

            // Kafa
            const headGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const head = new THREE.Mesh(headGeo, getHeadMaterials(shirtMat));
            head.position.y = 4;
            head.castShadow = true;
            charGroup.add(head);

            // Kollar ve Bacaklar için Pivot Noktaları (Düzgün sallanma için)
            const leftArmPivot = new THREE.Group(); leftArmPivot.position.set(-1.1, 3.2, 0);
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.0, 0.6), skinMat);
            leftArm.position.y = -0.9; leftArm.castShadow = true; leftArmPivot.add(leftArm);
            charGroup.add(leftArmPivot);

            const rightArmPivot = new THREE.Group(); rightArmPivot.position.set(1.1, 3.2, 0);
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.0, 0.6), skinMat);
            rightArm.position.y = -0.9; rightArm.castShadow = true; rightArmPivot.add(rightArm);
            charGroup.add(rightArmPivot);

            const leftLegPivot = new THREE.Group(); leftLegPivot.position.set(-0.4, 1.0, 0);
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.4, 0.6), shirtMat);
            leftLeg.position.y = -0.7; leftLeg.castShadow = true; leftLegPivot.add(leftLeg);
            charGroup.add(leftLegPivot);

            const rightLegPivot = new THREE.Group(); rightLegPivot.position.set(0.4, 1.0, 0);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.4, 0.6), shirtMat);
            rightLeg.position.y = -0.7; rightLeg.castShadow = true; rightLegPivot.add(rightLeg);
            charGroup.add(rightLegPivot);

            scene.add(charGroup);

            // Kolay animasyon kontrolü için referansları dönüyoruz
            return {
                root: charGroup,
                leftArm: leftArmPivot, rightArm: rightArmPivot,
                leftLeg: leftLegPivot, rightLeg: rightLegPivot
            };
        }

        // Oyuncular ve Botlar Tanımlanıyor
        const player1 = buildMinecraftCharacter(p1Mat); player1.root.position.set(-4, 0, 20);
        const player2 = buildMinecraftCharacter(p2Mat); player2.root.position.set(4, 0, 20); player2.root.visible = false;
        
        // İki kaleye de bot eklendi!
        const botKeeperNorth = buildMinecraftCharacter(p2Mat); botKeeperNorth.root.position.set(0, 0, -33);
        const botKeeperSouth = buildMinecraftCharacter(p1Mat); botKeeperSouth.root.position.set(0, 0, 33);

        // Top (Küp şeklinde dökülü top)
        const ball = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1.4), new THREE.MeshLambertMaterial({ map: ballTex }));
        ball.castShadow = true;
        scene.add(ball);

        // --- FİZİK VE OYUN VERİLERİ ---
        let isTwoPlayer = false;
        let score = { blue: 0, red: 0 };
        
        const data = {
            p1: { obj: player1, pos: player1.root.position, vel: new THREE.Vector3(), isGrounded: true, dancing: false, walkCycle: 0 },
            p2: { obj: player2, pos: player2.root.position, vel: new THREE.Vector3(), isGrounded: true, dancing: false, walkCycle: 0 },
            botNorth: { obj: botKeeperNorth, pos: botKeeperNorth.root.position, side: -1 },
            botSouth: { obj: botKeeperSouth, pos: botKeeperSouth.root.position, side: 1 },
            ball: { pos: ball.position, vel: new THREE.Vector3() }
        };

        function resetBall() {
            data.ball.pos.set(0, 6, 0);
            data.ball.vel.set(0, 0, 0);
        }
        resetBall();

        // --- KONTROLLER (INPUT) ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Digit2') {
                isTwoPlayer = true;
                player2.root.visible = true;
                document.getElementById('mode-text').innerText = "2 Oyuncu Modu Aktif (Ateş ve Su Stili)";
            }
            if (e.code === 'KeyG') data.p1.dancing = !data.p1.dancing;
            if (e.code === 'KeyL' && isTwoPlayer) data.p2.dancing = !data.p2.dancing;
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // Roblox Tarzı Kamera Çevirme (Sol Tık)
        let isMouseDown = false;
        let mouseX = 0, mouseY = 0;
        let cameraAngleX = 0;
        let cameraAngleY = 0.4;
        const cameraRadius = 18;

        window.addEventListener('mousedown', (e) => { if (e.button === 0) { isMouseDown = true; mouseX = e.clientX; mouseY = e.clientY; } });
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            cameraAngleX -= (e.clientX - mouseX) * 0.005;
            cameraAngleY = Math.max(0.05, Math.min(Math.PI/2 - 0.05, cameraAngleY + (e.clientY - mouseY) * 0.005));
            mouseX = e.clientX; mouseY = e.clientY;
        });
        window.addEventListener('mouseup', (e) => { if (e.button === 0) isMouseDown = false; });
        window.addEventListener('contextmenu', e => e.preventDefault()); // Sağ tık menüsünü kapa

        // Şut Tetikleyicileri
        window.addEventListener('mousedown', (e) => {
            if (e.button === 2) kickBall(data.p1); // Sağ tık P1 Şut
            if (e.button === 0 && isTwoPlayer && !isMouseDown) kickBall(data.p2); // Sol tık P2 Şut
        });

        function kickBall(playerData) {
            if (playerData.pos.distanceTo(data.ball.pos) < 3.5) {
                let dir = new THREE.Vector3().subVectors(data.ball.pos, playerData.pos).normalize();
                dir.y = 0.4; // Havalandırma havadan pas/şut efekti
                data.ball.vel.copy(dir.multiplyScalar(16));
            }
        }

        // --- OYUN DÖNGÜSÜ ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            // --- P1 (WASD) HAREKET VE KOL/BACAK SALLANMASI ---
            let p1Moving = false;
            if (!data.p1.dancing) {
                let mx = 0, mz = 0;
                if (keys['KeyW']) mz -= 1;
                if (keys['KeyS']) mz += 1;
                if (keys['KeyA']) mx -= 1;
                if (keys['KeyD']) mx += 1;

                if (mx !== 0 || mz !== 0) {
                    p1Moving = true;
                    let dir = new THREE.Vector3(mx, 0, mz).normalize();
                    data.p1.pos.add(dir.multiplyScalar(9 * dt));
                    player1.root.rotation.y = Math.atan2(-mx, -mz);
                    data.p1.walkCycle += dt * 12;
                }
                if (keys['Space'] && data.p1.isGrounded) { data.p1.vel.y = 11; data.p1.isGrounded = false; }
            }

            // --- P2 (OK TUŞLARI) HAREKET ---
            let p2Moving = false;
            if (isTwoPlayer && !data.p2.dancing) {
                let mx = 0, mz = 0;
                if (keys['ArrowUp']) mz -= 1;
                if (keys['ArrowDown']) mz += 1;
                if (keys['ArrowLeft']) mx -= 1;
                if (keys['ArrowRight']) mx += 1;

                if (mx !== 0 || mz !== 0) {
                    p2Moving = true;
                    let dir = new THREE.Vector3(mx, 0, mz).normalize();
                    data.p2.pos.add(dir.multiplyScalar(9 * dt));
                    player2.root.rotation.y = Math.atan2(-mx, -mz);
                    data.p2.walkCycle += dt * 12;
                }
                if (keys['Enter'] && data.p2.isGrounded) { data.p2.vel.y = 11; data.p2.isGrounded = false; }
                if (keys['ControlLeft']) kickBall(data.p2); // Klavyeden şut alternatifi
            }

            // --- EKSTREMİTE ANİMASYON MANTIĞI ---
            function animateLimbs(pData, isMoving) {
                if (pData.dancing) {
                    // Dans Animasyonu: Kollar yukarı, bacaklar yaylanıyor
                    pData.walkCycle += dt * 15;
                    pData.obj.root.position.y = Math.abs(Math.sin(pData.walkCycle)) * 1.5;
                    pData.obj.leftArm.rotation.x = -Math.PI + Math.sin(pData.walkCycle);
                    pData.obj.rightArm.rotation.x = -Math.PI - Math.sin(pData.walkCycle);
                    pData.obj.leftLeg.rotation.x = Math.sin(pData.walkCycle) * 0.3;
                    pData.obj.rightLeg.rotation.x = -Math.sin(pData.walkCycle) * 0.3;
                } else if (isMoving) {
                    // Yürüme Animasyonu: Kollar ve bacaklar çapraz sallanır
                    pData.obj.leftArm.rotation.x = Math.sin(pData.p1.walkCycle) * 0.8;
                    pData.obj.rightArm.rotation.x = -Math.sin(pData.p1.walkCycle) * 0.8;
                    pData.obj.leftLeg.rotation.x = -Math.sin(pData.p1.walkCycle) * 0.8;
                    pData.obj.rightLeg.rotation.x = Math.sin(pData.p1.walkCycle) * 0.8;
                } else {
                    // Sabit Durma Durumu Sıfırlama
                    pData.obj.leftArm.rotation.x = 0; pData.obj.rightArm.rotation.x = 0;
                    pData.obj.leftLeg.rotation.x = 0; pData.obj.rightLeg.rotation.x = 0;
                }
            }
            animateLimbs(data.p1, p1Moving);
            animateLimbs(data.p2, p2Moving);

            // --- İKİ KALECİ BOT YAPAY ZEKASI VE ANİMASYONU ---
            function runKeeperAI(botData) {
                let targetX = data.ball.pos.x;
                targetX = Math.max(-7, Math.min(7, targetX)); // Kaleden ayrılma sınırı
                
                // Kaleci topun gelişine göre yana doğru hareket eder
                let diffX = targetX - botData.pos.x;
                if (Math.abs(diffX) > 0.1) {
                    botData.pos.x += Math.sign(diffX) * 6 * dt;
                    botData.obj.leftLeg.rotation.x = Math.sin(clock.getElapsedTime() * 15) * 0.5;
                    botData.obj.rightLeg.rotation.x = -Math.sin(clock.getElapsedTime() * 15) * 0.5;
                }

                // Top kaleciye yaklaşınca topu ters yöne güçlüce fırlatır (kurtarış)
                if (botData.pos.distanceTo(data.ball.pos) < 3.2) {
                    data.ball.vel.set((Math.random() - 0.5) * 6, 6, botData.side * -17);
                }
            }
            runKeeperAI(data.botNorth);
            runKeeperAI(data.botSouth);

            // --- FİZİK VE YERÇEKİMİ SİMÜLASYONU ---
            // Oyuncu 1 Yerçekimi
            if (!data.p1.isGrounded) {
                data.p1.vel.y -= 28 * dt; data.p1.pos.y += data.p1.vel.y * dt;
                if (data.p1.pos.y <= 0) { data.p1.pos.y = 0; data.p1.isGrounded = true; }
            }
            // Oyuncu 2 Yerçekimi
            if (isTwoPlayer && !data.p2.isGrounded) {
                data.p2.vel.y -= 28 * dt; data.p2.pos.y += data.p2.vel.y * dt;
                if (data.p2.pos.y <= 0) { data.p2.pos.y = 0; data.p2.isGrounded = true; }
            }

            // Top Fiziği (Yerçekimi + Sürtünme + Dönüş Etkisi)
            data.ball.vel.y -= 16 * dt;
            data.ball.pos.addScaledVector(data.ball.vel, dt);

            // Top Saha Zemini Teması ve Sekmesi
            if (data.ball.pos.y < 0.7) {
                data.ball.pos.y = 0.7;
                data.ball.vel.y = -data.ball.vel.y * 0.65; // Sekme şiddeti
                data.ball.vel.x *= 0.97; data.ball.vel.z *= 0.97; // Zemin sürtünmesi
            }

            // Top Dönüş Efekti (Yuvarlanma Görseli)
            ball.rotation.x += data.ball.vel.z * dt * 0.3;
            ball.rotation.z -= data.ball.vel.x * dt * 0.3;

            // --- GOL VE SINIR KONTROLLERİ ---
            if (Math.abs(data.ball.pos.x) > 25 || Math.abs(data.ball.pos.z) > 35) {
                // Kuzey Kalesi Gol Kontrolü
                if (data.ball.pos.z < -35 && Math.abs(data.ball.pos.x) < 8 && data.ball.pos.y < 7) {
                    score.blue++; updateUI(); resetBall();
                } // Güney Kalesi Gol Kontrolü
                else if (data.ball.pos.z > 35 && Math.abs(data.ball.pos.x) < 8 && data.ball.pos.y < 7) {
                    score.red++; updateUI(); resetBall();
                } else {
                    resetBall(); // Taç / Avut durumu
                }
            }

            // --- ROBLOX TARZI ARKA KAMERA TAKİBİ ---
            let target = data.p1.pos;
            camera.position.x = target.x + cameraRadius * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.z = target.z + cameraRadius * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.y = target.y + cameraRadius * Math.sin(cameraAngleY) + 2.5;
            camera.lookAt(target.x, target.y + 2, target.z);

            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('ui').innerHTML = `MAVİ: ${score.blue} | KIRMIZI: ${score.red}<br><span id="mode-text" style="font-size: 16px; color: #ffeb3b;">${isTwoPlayer ? '2 Oyuncu Modu Aktif' : "1 Oyuncu Modu ('2' tuşu ile 2 Kişilik yap)"}</span>`;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Başlat
        animate();
    </script>
</body>
</html>
